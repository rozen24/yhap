<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Personal hygiene illustration">
  <defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="waterG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#skyG)"/>
  <!-- Showerhead -->
  <rect x="330" y="60" width="140" height="26" rx="10" fill="#64748B"/>
  <rect x="385" y="30" width="30" height="40" rx="6" fill="#475569"/>
  <circle cx="360" cy="90" r="3" fill="#0EA5E9"/>
  <circle cx="380" cy="90" r="3" fill="#0EA5E9"/>
  <circle cx="400" cy="90" r="3" fill="#0EA5E9"/>
  <circle cx="420" cy="90" r="3" fill="#0EA5E9"/>
  <circle cx="440" cy="90" r="3" fill="#0EA5E9"/>
  <!-- Water streams -->
  <g stroke="url(#waterG)" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="350" y1="100" x2="345" y2="280"/>
    <line x1="380" y1="100" x2="378" y2="320"/>
    <line x1="410" y1="100" x2="412" y2="330"/>
    <line x1="440" y1="100" x2="445" y2="300"/>
    <line x1="470" y1="100" x2="478" y2="275"/>
  </g>
  <!-- Water droplets falling -->
  <g fill="url(#waterG)" opacity="0.85">
    <ellipse cx="340" cy="350" rx="6" ry="10"/>
    <ellipse cx="380" cy="380" rx="6" ry="10"/>
    <ellipse cx="420" cy="355" rx="6" ry="10"/>
    <ellipse cx="460" cy="375" rx="6" ry="10"/>
    <ellipse cx="400" cy="420" rx="8" ry="12"/>
    <ellipse cx="360" cy="440" rx="5" ry="8"/>
    <ellipse cx="440" cy="445" rx="5" ry="8"/>
  </g>
  <!-- Soap bubbles -->
  <g fill="white" opacity="0.85">
    <circle cx="200" cy="430" r="30"/>
    <circle cx="240" cy="460" r="22"/>
    <circle cx="600" cy="440" r="28"/>
    <circle cx="640" cy="470" r="20"/>
    <circle cx="180" cy="480" r="18"/>
    <circle cx="660" cy="500" r="16"/>
  </g>
  <g fill="#0EA5E9" opacity="0.35">
    <circle cx="200" cy="430" r="30" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="600" cy="440" r="28" fill="none" stroke="#0EA5E9" stroke-width="2"/>
  </g>
  <!-- Ground water pool -->
  <ellipse cx="400" cy="560" rx="320" ry="30" fill="#0EA5E9" opacity="0.25"/>
  <ellipse cx="400" cy="560" rx="280" ry="20" fill="#38BDF8" opacity="0.4"/>
</svg>