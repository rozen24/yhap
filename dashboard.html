          <div class="anatomy-card__icon" aria-hidden="true">🔬</div>
          <div>
            <div class="anatomy-card__title">
              <span class="bn">মহিলাদের প্রজনন অঙ্গের গঠন</span>
              <span class="en">Female Reproductive Anatomy</span>
            </div>
            <div class="anatomy-card__subtitle">
              <span class="bn">মাসিক চক্রের সাথে সম্পর্কিত অঙ্গসমূহ</span>
              <span class="en">Organs involved in the menstrual cycle</span>
            </div>
          </div>
        </div>
        <div class="anatomy-card__body">
          <div class="anatomy-image-frame">
            <img
              class="anatomy-image"
              src="images/female-reproductive-anatomy.png"
              alt="Labeled diagram of female reproductive anatomy showing fallopian tubes, ovaries, uterus, cervix, vagina, and vaginal opening (Bengali labels)"
              loading="lazy"
              decoding="async"
              width="1536" height="1024" />
          </div>
          <p class="anatomy-caption bn">ডিম্ববাহী নালী · ডিম্বাশয় · জরায়ু · জরায়ুর মুখ · যোনিপথ · যোনিপথের মুখ</p>
          <p class="anatomy-caption en">Fallopian tubes · Ovaries · Uterus · Cervix · Vagina · Vaginal opening</p>
        </div>
      </aside>

      <article class="organ-card organ-card--ovaries">
        <div class="organ-card__header">
          <div class="organ-card__icon" aria-hidden="true">🥚</div>
          <h3 class="organ-card__title">
            <span class="bn">ডিম্বাশয় / Ovaries</span>
            <span class="en">Ovaries</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">জরায়ুর দুই পাশে একটি করে মোট দুটি ডিম্বাশয় থাকে। প্রতি ২৮ দিনের মাসিক চক্রের প্রায় মাঝামাঝি সময়ে দুটির মধ্যে একটি ডিম্বাশয়ে একটি পরিপক্ব ডিম্বাণু তৈরি হয়, যা ডিম্বাশয় থেকে বের হয়ে ডিম্ববাহী নালিতে প্রবেশ করে।</p>
          <p class="organ-card__text en">There are two ovaries, one on each side of the uterus. Around the middle of each 28-day menstrual cycle, one of the two ovaries matures an egg (ovum), which is then released from the ovary and enters the fallopian tube.</p>
        </div>
      </article>

      <article class="organ-card organ-card--uterus">
        <div class="organ-card__header">
          <div class="organ-card__icon" aria-hidden="true">🌸</div>
          <h3 class="organ-card__title">
            <span class="bn">জরায়ু / Uterus</span>
            <span class="en">Uterus</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">জরায়ু হলো তলপেটে অবস্থিত একটি ফাঁপা, ত্রিভুজাকৃতি অঙ্গ। এর সামনে থাকে মূত্রথলি এবং পিছনে মলাশয়। জরায়ুর দুটি অংশ — প্রধান অংশ ও জরায়ুমুখ। প্রধান অংশের উপরের দুই কোণ থেকে দুটি ডিম্ববাহী নালি শুরু হয়। জরায়ুর প্রধান কাজ গর্ভধারণে সহায়তা করা। গর্ভধারণ না হলে মাসিক চক্রের হরমোনগত পরিবর্তনে জরায়ুর ভেতরের আস্তরণ বের হয়ে আসে — এটাই মাসিক।</p>
          <p class="organ-card__text en">The uterus is a hollow, triangular-shaped organ located in the lower abdomen. In front of it lies the urinary bladder, and behind it is the rectum. The uterus has two parts: the main body and the cervix (neck of the uterus). From the upper corners of the main body, the two fallopian tubes originate. The primary function of the uterus is to support pregnancy. If pregnancy does not occur, hormonal changes during the menstrual cycle cause the inner lining of the uterus to shed — this is called menstruation.</p>
        </div>
      </article>

      <article class="organ-card organ-card--fallopian">
        <div class="organ-card__header">
          <div class="organ-card__icon" aria-hidden="true">🧬</div>
          <h3 class="organ-card__title">
            <span class="bn">ডিম্ববাহী নালি / Fallopian Tubes</span>
            <span class="en">Fallopian Tubes</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">জরায়ু থেকে দুই পাশের ডিম্বাশয়ের দিকে দুটি লম্বা ডিম্ববাহী নালি প্রসারিত হয়। নালির প্রান্ত আঙুলের মতো শাখায় বিভক্ত — এগুলোকে ফিমব্রি বলে। মিলনের পর যোনিপথ থেকে শুক্রাণু জরায়ু হয়ে ডিম্ববাহী নালিতে পৌঁছায়। এই সময় ডিম্বস্ফোটন ঘটলে ডিম্বাণু ডিম্বাশয় থেকে বের হয়ে ফিমব্রির মাধ্যমে নালিতে প্রবেশ করে এবং এখানেই শুক্রাণু ও ডিম্বাণুর মিলন (নিষেক) ঘটে। নিষিক্ত ডিম্বাণু কিছু দিন নালিতে অবস্থান করে জরায়ুতে ফিরে এসে ভ্রূণ হিসেবে স্থাপিত হয়।</p>
          <p class="organ-card__text en">Two long fallopian tubes extend from the uterus toward the ovaries on each side. The ends of the fallopian tubes are divided into finger-like projections called fimbriae. After intercourse, sperm travel from the vagina through the uterus and into the fallopian tube. If ovulation occurs at this time, the egg is released from the ovary and enters the fallopian tube via the fimbriae. Fertilization (the union of the egg and sperm) takes place here. The fertilized egg remains in the fallopian tube for a few days before returning to the uterus, where it implants as an embryo.</p>
        </div>
      </article>

      <article class="organ-card organ-card--vagina">
        <div class="organ-card__header">
          <div class="organ-card__icon" aria-hidden="true">🌿</div>
          <h3 class="organ-card__title">
            <span class="bn">যোনিপথ / Vagina</span>
            <span class="en">Vagina</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">যোনিপথ জরায়ুমুখের ভেতর থেকে শুরু হয়ে শরীরের বাইরে যোনিপথের মুখ পর্যন্ত প্রসারিত থাকে।</p>
          <p class="organ-card__text en">The vagina begins from the inside of the cervix and extends to the outside of the body, ending at the vaginal opening.</p>
        </div>
      </article>

      <article class="organ-card organ-card--breasts">
        <div class="organ-card__header">
          <div class="organ-card__icon" aria-hidden="true">🤱</div>
          <h3 class="organ-card__title">
            <span class="bn">স্তন / Breasts</span>
            <span class="en">Breasts</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">যদিও স্তন সরাসরি প্রজনন ব্যবস্থার অংশ নয়, সন্তান জন্মের পর মায়ের দুধ তৈরি করায় এটিকে সহায়ক প্রজনন অঙ্গ হিসেবে বিবেচনা করা হয়।</p>
          <p class="organ-card__text en">Although the breasts are not directly part of the reproductive system, they are considered accessory reproductive organs because they produce breast milk after childbirth.</p>
        </div>
      </article>

    </div>
  </section>

  <!-- Section header — bilingual -->
  <div class="repro-section-title repro-section-title--teal">
    <span class="bn">মাসিক / ঋতুস্রাব</span>
    <span class="en">Menstruation / Menstrual Cycle</span>
  </div>

  <!-- Intro card — FULL WIDTH -->
  <div class="repro-card">
    <div class="repro-card__header repro-card__header--teal">
      <div class="repro-card__icon" aria-hidden="true">🌊</div>
      <div>
        <div class="repro-card__title">
          <span class="bn">মাসিক কী?</span>
          <span class="en">What is Menstruation?</span>

/* ── BOTTOM LABEL ────────────────────────────────── */
function syncBottomLabel() {
  const el = document.getElementById('bottomLabel');
  const isBn = currentLang === 'bn';
  el.textContent = activeLesson === null
    ? (isBn ? `মডিউল ${activeModule+1} — পরিচিতি` : `Module ${activeModule+1} — Overview`)
    : (isBn ? `মডিউল ${activeModule+1} — পাঠ ${activeLesson+1}` : `Module ${activeModule+1} — Lesson ${activeLesson+1}`);
}

/* ── SIDEBAR TOGGLE ──────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebarToggle');
  if (isMobile()) {
    const open = sidebar.dataset.mobileOpen === 'true';
    if (open) { closeMobileSidebar(); } else {
      sidebar.dataset.mobileOpen = 'true';
      document.getElementById('sidebarOverlay').classList.add('is-visible');
      toggle.setAttribute('aria-expanded', 'true');
    }
  } else {
    const collapsed = sidebar.dataset.collapsed === 'true';
    sidebar.dataset.collapsed = String(!collapsed);
    toggle.setAttribute('aria-expanded', String(collapsed));
    document.getElementById('dashboard').style.gridTemplateColumns =
      collapsed ? '' : '0 1fr';
  }
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.dataset.mobileOpen = 'false';
  document.getElementById('sidebarOverlay').classList.remove('is-visible');
  document.getElementById('sidebarToggle').setAttribute('aria-expanded', 'false');
}

/* ── LANGUAGE ────────────────────────────────────── */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang === 'bn' ? 'bn' : 'en');
  document.getElementById('btnBn').setAttribute('aria-pressed', String(lang === 'bn'));
  document.getElementById('btnEn').setAttribute('aria-pressed', String(lang === 'en'));
  syncBottomLabel();
}

/* ── THEME ───────────────────────────────────────── */

  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  const btn = document.getElementById('themeBtn');
  btn.textContent = isDark ? '☀️' : '🌙';
  btn.setAttribute('aria-label', isDark ? 'Switch to dark mode' : 'Switch to light mode');
}

/* ── KEYBOARD ────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isMobile()) closeMobileSidebar();
});

/* ── INIT ────────────────────────────────────────── */
(function () {
  const saved = restoreSavedLesson();
  if (saved) {
    openModule(saved.modIdx);
    if (saved.lesIdx === -1) {
      loadModule(saved.modIdx);  // Module overview
    } else {
      loadLesson(saved.modIdx, saved.lesIdx);  // Specific lesson
    }
  } else {
    openModule(0);        // open Module 1 accordion
    loadLesson(0, 0);     // load Module 1, Lesson 1
  }
  setLang('bn');        // default language
})();
</script>
</body>
</html>
