    [data-theme="dark"] .role-section__body { background: var(--surface); }

    [data-theme="dark"] .care-section-title {
      background: linear-gradient(90deg, rgba(0, 174, 239, 0.12) 0%, transparent 100%);
      box-shadow: 0 4px 12px rgba(0, 174, 239, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

      color: #64B5F6;

    /* SUBSECTION HEADERS (Nested inside main section) */

    .subsection {
      margin-bottom: 24px;

      display: flex;

      .role-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }

    /* ============================================================
       FEMALE REPRODUCTIVE SYSTEM OVERVIEW — Module 3, Lesson 1
    ============================================================ */
    .organ-section { margin-bottom: 28px; }
    .organ-section__heading {
      position: relative;
      padding-left: 14px;
      margin: 0 0 14px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
    }
    .organ-section__heading::before {
      content: '';
      position: absolute;
      left: 0; top: 6px; bottom: 6px;
      width: 4px; border-radius: 4px;
      background: linear-gradient(180deg, var(--color-blue), var(--color-navy));
    }

    /* Common heading 2 class - reuses organ-section__heading styles */
    .common_heading_2 {
      position: relative;
      padding-left: 14px;
      margin: 0 0 14px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
    }
    .common_heading_2::before {
      content: '';
      position: absolute;
      left: 0; top: 6px; bottom: 6px;
      width: 4px; border-radius: 4px;
      background: linear-gradient(180deg, var(--color-blue), var(--color-navy));
    }

    /* Module 2 Lesson 1 specific heading - uses green gradient */
    .changes-section__heading.common_heading_2::before {
      background: linear-gradient(180deg, var(--color-green), var(--color-green-dark));
    }

    .organ-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    /* Module 4 Lesson 1: force 2 cards per row on desktop */
    .organ-section--male .organ-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .organ-card {
      --og-from: #1CABE2;
      --og-to:   #0D47A1;
      --og-soft: rgba(28,171,226,0.08);
      --og-ring: rgba(28,171,226,0.22);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(13,71,161,0.04), 0 4px 14px rgba(13,71,161,0.05);

                  box-shadow var(--dur) var(--ease),
                  border-color var(--dur) var(--ease);
    }
    .organ-card:hover {
      transform: translateY(-4px);

      border-color: var(--og-ring);

      position: relative;

      overflow: hidden;
    }
    .organ-card__header::after {

      pointer-events: none;
    }
    .organ-card__icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 11px;
      background: rgba(255,255,255,0.20);
      border: 1px solid rgba(255,255,255,0.30);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      position: relative; z-index: 1;
    }
    .organ-card__title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0;
      position: relative; z-index: 1;
    }

    .organ-card__body {

    .organ-card__text {
      font-size: 13px;
      line-height: 1.7;

    /* Per-card gradient palette (pulls from dashboard vocabulary) */
    .organ-card--ovaries      { --og-from:#EC4899; --og-to:#831843; --og-ring:rgba(236,72,153,0.22); }
    .organ-card--uterus       { --og-from:#8B5CF6; --og-to:#4C1D95; --og-ring:rgba(139,92,246,0.22); }
    .organ-card--fallopian    { --og-from:#F59E0B; --og-to:#B45309; --og-ring:rgba(245,158,11,0.25); }
    .organ-card--vagina       { --og-from:#14B8A6; --og-to:#134E4A; --og-ring:rgba(20,184,166,0.22); }
    .organ-card--breasts      { --og-from:#F43F5E; --og-to:#7F1D1D; --og-ring:rgba(244,63,94,0.22); }
    /* Male reproductive system variants (Module 4 Lesson 1) */
    .organ-card--penis        { --og-from:#0EA5E9; --og-to:#075985; --og-ring:rgba(14,165,233,0.22); }
    .organ-card--urethra      { --og-from:#6366F1; --og-to:#312E81; --og-ring:rgba(99,102,241,0.22); }
    .organ-card--testes       { --og-from:#3B82F6; --og-to:#1E3A8A; --og-ring:rgba(59,130,246,0.22); }
    .organ-card--sperm        { --og-from:#06B6D4; --og-to:#155E75; --og-ring:rgba(6,182,212,0.22); }

    @media (max-width: 900px) {
      .organ-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
      .organ-section--male .organ-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 600px) {
      .organ-grid { grid-template-columns: 1fr; gap: 12px; }
      .organ-section--male .organ-grid { grid-template-columns: 1fr; }
      .organ-card__header { padding: 14px 16px; }
      .organ-card__icon { width: 36px; height: 36px; font-size: 18px; }
      .organ-card__body { padding: 14px 16px 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .organ-card:hover { transform: none; }
    }

    /* ============================================================
       NOCTURNAL EMISSION — Module 4, Lesson 1 (standalone section)
    ============================================================ */
    .nocturnal-section { margin-top: 28px; }
    .nocturnal-wrap {
      display: flex;
      justify-content: center;
    }
    .nocturnal-card {
      width: 33.333%;
      min-width: 0;
      background: linear-gradient(160deg, #1E3A8A 0%, #1E40AF 55%, #1D4ED8 100%);
      color: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(30,58,138,0.18), 0 20px 40px rgba(30,58,138,0.22);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .nocturnal-card__media {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .nocturnal-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .nocturnal-card__body {
      padding: 18px 20px 20px;
    }
    .nocturnal-card__body .organ-card__text {
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      line-height: 1.75;
      margin: 0;
    }

    @media (max-width: 1200px) {
      .nocturnal-card { width: 50%; }
    }
    @media (max-width: 700px) {
      .nocturnal-card { width: 100%; }
    }

    /* ============================================================
       LESSON SUBHEADING
    ============================================================ */
    .lesson-subheading {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-secondary);
      margin: 0 0 24px;
      padding: 16px 20px;
      background: var(--surface-2);
      border-left: 4px solid var(--color-blue);
      border-radius: 8px;
    }

    [data-theme="dark"] .lesson-subheading {
      background: rgba(28,171,226,0.08);
    }

    /* ============================================================
       FAMILY PLANNING COMPARISON SECTION
    ============================================================ */
    .section-divider {
      margin: 32px 0 24px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-divider__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .section-divider__title span {
      display: block;
    }

    .section-divider__title::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--color-blue), var(--color-cyan));
      border-radius: 2px;
      margin-top: 8px;
    }

    /* Table Wrapper */
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    /* Comparison Table */
    .comparison-table,
    .details-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .comparison-table thead,
    .details-table thead {
      background: linear-gradient(135deg, rgba(28,171,226,0.08), rgba(105,206,236,0.06));
      border-bottom: 2px solid var(--border);
    }

    .comparison-table th,
    .details-table th {
      padding: 16px 5px;
      text-align: start;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .comparison-table tbody tr,
    .details-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background-color var(--dur) var(--ease);
    }

    .comparison-table tbody tr:hover,
    .details-table tbody tr:hover {
      background-color: var(--surface-2);
    }

    .table-header {
      padding: 14px 12px;
      font-size: 13px;
      border-right: 1px solid #eaeaea;
    }

    .aqi-table {
      table-layout: fixed;
    }

    .aqi-table th,
    .aqi-table td {
      width: 33.333%;
    }

    .aqi-table .table-header {
      text-align: center;
      white-space: normal;
    }

    .method-header {
      text-align: center;
      padding: 12px 8px;
    }

    .table-cell {
      padding: 14px 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      border-right: 1px solid #eaeaea;

    }

    /* Module 18 Lesson 4 CSS - maintained for consistency */

    .category-cell {
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
    }

    .cell-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .check-cell {
      text-align: center;
      color: var(--color-green);
      font-size: 18px;
      font-weight: 700;
      background: rgba(46,204,113,0.05);
    }

    .method-name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface-2);
      min-width: 180px;
      white-space: nowrap;
    }

    .duration-cell {
      padding: 14px 12px;
    }

    /* Method Badge */
    .method-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }

    .method-badge:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .method-badge--sky {
      background: rgba(14,165,233,0.15);
      color: #0284C7;
      border: 1px solid rgba(14,165,233,0.3);
    }

    .method-badge--amber {
      background: rgba(245,158,11,0.15);
      color: #B45309;
      border: 1px solid rgba(245,158,11,0.3);
    }

    .method-badge--green {
      background: rgba(16,185,129,0.15);
      color: #047857;
      border: 1px solid rgba(16,185,129,0.3);
    }

    .method-badge--indigo {
      background: rgba(99,102,241,0.15);
      color: #4F46E5;
      border: 1px solid rgba(99,102,241,0.3);
    }

    .method-badge--violet {
      background: rgba(139,92,246,0.15);
      color: #7C3AED;
      border: 1px solid rgba(139,92,246,0.3);
    }

    .method-badge--rose {
      background: rgba(244,63,94,0.15);
      color: #BE123C;
      border: 1px solid rgba(244,63,94,0.3);
    }

    .method-badge--teal {
      background: rgba(20,184,166,0.15);
      color: #0D9488;
      border: 1px solid rgba(20,184,166,0.3);
    }

    /* Duration Badge */
    .duration-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(99,102,241,0.12);
      color: #4F46E5;
      border: 1px solid rgba(99,102,241,0.25);
      white-space: nowrap;
    }

    [data-theme="dark"] .table-wrapper {
      border-color: var(--border);
    }

    [data-theme="dark"] .comparison-table thead,
    [data-theme="dark"] .details-table thead {
      background: linear-gradient(135deg, rgba(28,171,226,0.12), rgba(105,206,236,0.08));
    }

    [data-theme="dark"] .category-cell,
    [data-theme="dark"] .method-name-cell {
      background: var(--surface-2);
    }

    /* ============================================================
       CHILD MARRIAGE AWARENESS SECTION
    ============================================================ */
    /* ─── CHILD MARRIAGE SECTION (REDESIGNED) ─── */
    .child-marriage-section {
      display: block;
      padding: 0;
    }

    /* Intro paragraph */
    .cm-intro-paragraph {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
    }

    .cm-intro-paragraph:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-blue);
    }

    .cm-intro-paragraph p {
      margin: 0;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-secondary);
    }

    /* Highlighted content box */
    .cm-highlighted-box {
      background: #fff;
      border-left: 4px solid #FFC20E;
      padding: 10px;
      border-radius: var(--radius);
      margin-top: 50px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.8;
    }

    .cm-highlighted-box p:first-child {
      margin-top: 0;
    }

    .cm-highlighted-box p:last-child {
      margin-bottom: 0;
    }

    [data-theme="dark"] .cm-highlighted-box {
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.12) 0%, rgba(255, 193, 7, 0.06) 100%);
      border-left-color: #FFD54F;
    }
    [data-theme="dark"] .cm-intro-paragraph {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-secondary);
    }

    /* Two-column layout: circles (left) + hub (right) */
    .cm-main-container {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 50px;
      margin-bottom: 50px;
      align-items: center;
    }

    /* Left column: circles stacked */
    .cm-circles-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }

    /* Right column: title + hub content */
    .cm-hub-wrapper {
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 800px) {
      .cm-main-container {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      .cm-circles-container {
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 600px) {
      .cm-main-container {
        gap: 30px;
      }
      .cm-circles-container {
        gap: 20px;
      }
    }

    /* Circular cards */
    .cm-circle {
      width: 195px;
      height: 195px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 15px;
      position: relative;
      font-size: 14px;
      line-height: 1.7;
      box-shadow: 0 4px 16px rgba(13, 71, 161, 0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .cm-circle:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 24px rgba(13, 71, 161, 0.16);
    }

    .cm-circle--green {
      background: linear-gradient(135deg, rgba(46, 204, 113, 0.12) 0%, rgba(46, 204, 113, 0.04) 100%);
      border: 2px solid rgba(46, 204, 113, 0.4);
    }

    .cm-circle--teal {
      background: linear-gradient(135deg, rgba(26, 188, 156, 0.12) 0%, rgba(26, 188, 156, 0.04) 100%);
      border: 2px solid rgba(26, 188, 156, 0.4);
    }

    [data-theme="dark"] .cm-circle--green {
      background: linear-gradient(135deg, rgba(46, 204, 113, 0.2) 0%, rgba(46, 204, 113, 0.08) 100%);
      border-color: rgba(46, 204, 113, 0.6);
    }

    [data-theme="dark"] .cm-circle--teal {
      background: linear-gradient(135deg, rgba(26, 188, 156, 0.2) 0%, rgba(26, 188, 156, 0.08) 100%);
      border-color: rgba(26, 188, 156, 0.6);
    }

    [data-theme="dark"] .cm-title-box {
      background: linear-gradient(135deg, rgba(13, 71, 161, 0.15) 0%, rgba(28, 171, 226, 0.08) 100%);
      border-color: rgba(28, 171, 226, 0.3);
    }

    .cm-circle__icon {
      font-size: 48px;
    }

    .cm-circle__text {
      margin: 6px 0;
      font-weight: 600;
    }

    /* Title box - now positioned at top of right column */
    .cm-title-box {
      padding: 5px;
      display: contents;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: auto;
      background: linear-gradient(135deg, rgba(28, 171, 226, 0.08) 0%, rgba(13, 71, 161, 0.04) 100%);
      border: 1px solid rgba(28, 171, 226, 0.2);
      border-radius: var(--radius);
    }

    .cm-title-box__heading {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #1CABE2 0%, #0D7BA7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin: 0;
    }

    [data-theme="dark"] .cm-title-box__heading {
      -webkit-text-fill-color: unset;
      color: #69CEEC;
    }

    /* Language visibility */
    [data-lang="en"] .cm-circle__text.bn,
    [data-lang="bn"] .cm-circle__text.en,
    [data-lang="en"] .cm-title-box__heading.bn,
    [data-lang="bn"] .cm-title-box__heading.en,
    [data-lang="en"] .cm-hub-center__text.bn,
    [data-lang="bn"] .cm-hub-center__text.en,
    [data-lang="en"] .cm-hub-card__text.bn,
    [data-lang="bn"] .cm-hub-card__text.en {
      display: none;
    }

    /* Hub section - displayed inside wrapper */
    .cm-hub-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .cm-hub-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Central circle */
    .cm-hub-center {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(13, 71, 161, 0.12) 0%, rgba(28, 171, 226, 0.08) 100%);
      border: 2px solid rgba(28, 171, 226, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .cm-hub-center_projono {
      width: 150px;
      height: 150px;
    }

    .cm-hub-center__icon {
      font-size: 40px;
      margin-bottom: 5px;
    }

    .cm-hub-center__text {
      font-size: 15px;
      font-weight: bold;
      color: var(--text-primary);
      margin: 2px 0;
    }

    /* Hub grid - 10 points in circular arrangement */
    .cm-hub-grid {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .cm-hub-card {
      position: absolute;
      width: 99px;
      height: 99px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      line-height: 1.3;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.5) 100%);
      border: 2px solid;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 10px;
    }
    .cm-hub-card_projono {
      width: 155px;
      height: 155px;
    }
    .cm-hub-card:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
    }

    /* Position 10 cards in circle (36 degrees apart) */
    .cm-hub-card:nth-child(1) { --angle: 0deg; }
    .cm-hub-card:nth-child(2) { --angle: 36deg; }
    .cm-hub-card:nth-child(3) { --angle: 72deg; }
    .cm-hub-card:nth-child(4) { --angle: 108deg; }
    .cm-hub-card:nth-child(5) { --angle: 144deg; }
    .cm-hub-card:nth-child(6) { --angle: 180deg; }
    .cm-hub-card:nth-child(7) { --angle: 216deg; }
    .cm-hub-card:nth-child(8) { --angle: 252deg; }
    .cm-hub-card:nth-child(9) { --angle: 288deg; }
    .cm-hub-card:nth-child(10) { --angle: 324deg; }

    
    .cm-hub-card {
      --radius: 175px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--radius))) rotate(calc(-1 * var(--angle)));
    }

    .cm-hub-card_projono {
      --radius: 185px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--radius))) rotate(calc(-1 * var(--angle)));
    }

    .cm-hub-card:hover {
      transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--radius))) rotate(calc(-1 * var(--angle))) scale(1.12);
    }

    .cm-hub-card__icon {
      font-size: 24px;
      margin-bottom: 3px;
      display: block;
    }

    .cm-hub-card__text {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-primary);
    }

    /* Light color borders and backgrounds for each card */
    .cm-hub-card:nth-child(1) { border-color: rgba(28, 171, 226, 0.4); background: linear-gradient(135deg, rgba(28, 171, 226, 0.09) 0%, rgba(28, 171, 226, 0.02) 100%); }
    .cm-hub-card:nth-child(2) { border-color: rgba(46, 204, 113, 0.4); background: linear-gradient(135deg, rgba(46, 204, 113, 0.09) 0%, rgba(46, 204, 113, 0.02) 100%); }
    .cm-hub-card:nth-child(3) { border-color: rgba(255, 194, 14, 0.4); background: linear-gradient(135deg, rgba(255, 194, 14, 0.09) 0%, rgba(255, 194, 14, 0.02) 100%); }
    .cm-hub-card:nth-child(4) { border-color: rgba(231, 76, 60, 0.4); background: linear-gradient(135deg, rgba(231, 76, 60, 0.09) 0%, rgba(231, 76, 60, 0.02) 100%); }
    .cm-hub-card:nth-child(5) { border-color: rgba(155, 89, 182, 0.4); background: linear-gradient(135deg, rgba(155, 89, 182, 0.09) 0%, rgba(155, 89, 182, 0.02) 100%); }
    .cm-hub-card:nth-child(6) { border-color: rgba(26, 188, 156, 0.4); background: linear-gradient(135deg, rgba(26, 188, 156, 0.09) 0%, rgba(26, 188, 156, 0.02) 100%); }
    .cm-hub-card:nth-child(7) { border-color: rgba(230, 126, 34, 0.4); background: linear-gradient(135deg, rgba(230, 126, 34, 0.09) 0%, rgba(230, 126, 34, 0.02) 100%); }
    .cm-hub-card:nth-child(8) { border-color: rgba(52, 73, 94, 0.4); background: linear-gradient(135deg, rgba(52, 73, 94, 0.09) 0%, rgba(52, 73, 94, 0.02) 100%); }
    .cm-hub-card:nth-child(9) { border-color: rgba(13, 71, 161, 0.4); background: linear-gradient(135deg, rgba(13, 71, 161, 0.09) 0%, rgba(13, 71, 161, 0.02) 100%); }
    .cm-hub-card:nth-child(10) { border-color: rgba(149, 165, 166, 0.4); background: linear-gradient(135deg, rgba(149, 165, 166, 0.09) 0%, rgba(149, 165, 166, 0.02) 100%); }

    [data-theme="dark"] .cm-hub-card {
      background: linear-gradient(135deg, rgba(13, 71, 161, 0.12) 0%, rgba(28, 171, 226, 0.06) 100%) !important;
      border-color: rgba(28, 171, 226, 0.3) !important;
    }

    [data-theme="dark"] .cm-hub-card:hover {
      background: linear-gradient(135deg, rgba(28, 171, 226, 0.18) 0%, rgba(28, 171, 226, 0.08) 100%) !important;
    }

    [data-theme="dark"] .cm-circle--green,
    [data-theme="dark"] .cm-circle--teal {
      background: linear-gradient(135deg, rgba(46, 204, 113, 0.2) 0%, rgba(46, 204, 113, 0.1) 100%);
    }

    [data-theme="dark"] .cm-hub-center {
      background: linear-gradient(135deg, rgba(28, 171, 226, 0.15) 0%, rgba(13, 71, 161, 0.1) 100%);
    }

    /* ============================================================
       ADOLESCENT MOTHERHOOD HUB SECTION
    ============================================================ */
    .am-intro-box {
      position: relative;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 22px 26px;
      background: linear-gradient(135deg, #F43F5E 0%, #BE123C 55%, #7F1D1D 100%);
      border-radius: var(--radius);
      margin-bottom: 32px;
      color: #fff;
      overflow: hidden;
    }

    .am-intro-box::after {
      content: '';

function esc(str) {
  return String(str).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
  );
}
function isMobile() { return window.innerWidth <= 900; }

const _panelHeights = new Map(); // cache scrollHeight per panel id

function openModule(idx) {
  const count = MODULES.length;
  for (let i = 0; i < count; i++) {
    const trigger = document.getElementById('modTrigger-' + i);
    const panel   = document.getElementById('modPanel-'   + i);
    if (!trigger || !panel) continue;
    const open = (i === idx);
    trigger.setAttribute('aria-expanded', String(open));
    panel.dataset.open = String(open);
    if (open) {
      // Measure only if not cached or panel height might have changed
      if (!_panelHeights.has(i)) _panelHeights.set(i, panel.scrollHeight);
      panel.style.maxHeight = _panelHeights.get(i) + 'px';
    } else {
      panel.style.maxHeight = '0';
    }
  }
}

function handleModuleClick(idx) {
  const trigger = document.getElementById('modTrigger-' + idx);
  const isOpen  = trigger.getAttribute('aria-expanded') === 'true';
  if (isOpen) {
    // Close this panel (allow toggling closed)
    trigger.setAttribute('aria-expanded', 'false');
    document.getElementById('modPanel-' + idx).style.maxHeight = '0';
  } else {
    openModule(idx);
  }
  loadModule(idx);
}

/* ── NAVIGATION ──────────────────────────────────── */
function loadModule(modIdx) {
  activeModule = modIdx;
  activeLesson = null;
  saveCurrentLesson(modIdx, -1);  // Save module overview with lesIdx = -1
  syncSidebarActive(modIdx, null);
  renderModulePage(modIdx);
  syncBottomLabel();
  scrollContentToTop();
}

function loadLesson(modIdx, lesIdx) {
  activeModule = modIdx;
  activeLesson = lesIdx;
  saveCurrentLesson(modIdx, lesIdx);  // Save to localStorage
  openModule(modIdx);
  syncSidebarActive(modIdx, lesIdx);
  renderLessonPage(modIdx, lesIdx);
  syncBottomLabel();
  scrollContentToTop();
  if (isMobile()) closeMobileSidebar();
}

function navigate(dir) {
  const total = LESSONS_BN[activeModule].length;
  if (activeLesson === null) {
    if (dir > 0) loadLesson(activeModule, 0);
    return;
  }
  const next = activeLesson + dir;
  if (next < 0) {
    loadModule(activeModule);
  } else if (next >= total) {
    const nextMod = activeModule + 1;
    if (nextMod < MODULES.length) { openModule(nextMod); loadModule(nextMod); }
  } else {
    loadLesson(activeModule, next);
  }
}

function scrollContentToTop() {
  document.getElementById('contentArea').scrollTop = 0;
}

/* ── LESSON PERSISTENCE ──────────────────────────── */
function saveCurrentLesson(modIdx, lesIdx) {
  localStorage.setItem('lastModule', String(modIdx));
  localStorage.setItem('lastLesson', String(lesIdx));
}

function restoreSavedLesson() {
  const savedModule = localStorage.getItem('lastModule');
  const savedLesson = localStorage.getItem('lastLesson');
  if (savedModule !== null && savedLesson !== null) {
    const modIdx = parseInt(savedModule, 10);
    const lesIdx = parseInt(savedLesson, 10);
    // Validate module index is within bounds
    if (modIdx >= 0 && modIdx < MODULES.length) {
      // If lesIdx is -1, it's a module overview page
      if (lesIdx === -1) {
        return { modIdx, lesIdx };
      }
      // Otherwise validate lesson index is within bounds
      if (lesIdx >= 0 && lesIdx < LESSONS_BN[modIdx].length) {
        return { modIdx, lesIdx };
      }
    }
  }
  return null;  // Return null if no valid saved lesson
}

/* ── SIDEBAR ACTIVE STATE ────────────────────────── */
function syncSidebarActive(modIdx, lesIdx) {
  document.querySelectorAll('.module-trigger').forEach(t => t.classList.remove('is-active'));
  document.querySelectorAll('.lesson-btn').forEach(b => {
    b.classList.remove('is-active');
    b.removeAttribute('aria-current');
  });
  const trigger = document.getElementById('modTrigger-' + modIdx);
  if (trigger) trigger.classList.add('is-active');
  if (lesIdx !== null) {
    const btns = document.querySelectorAll('#modPanel-' + modIdx + ' .lesson-btn');
    if (btns[lesIdx]) {
      btns[lesIdx].classList.add('is-active');
      btns[lesIdx].setAttribute('aria-current', 'page');
    }
  }
}

/* ── BOTTOM LABEL ────────────────────────────────── */
function syncBottomLabel() {
  const el = document.getElementById('bottomLabel');
  const isBn = currentLang === 'bn';
  el.textContent = activeLesson === null
    ? (isBn ? `মডিউল ${activeModule+1} — পরিচিতি` : `Module ${activeModule+1} — Overview`)
    : (isBn ? `মডিউল ${activeModule+1} — পাঠ ${activeLesson+1}` : `Module ${activeModule+1} — Lesson ${activeLesson+1}`);
}

// Draw/update curved connectors between feedback and sender/receiver
let _commUpdateScheduled = false;
function updateCommConnections() {
  const shell = document.querySelector('.comm-process-shell');
  if (!shell) return;
  if (_commUpdateScheduled) return;
  _commUpdateScheduled = true;
  requestAnimationFrame(() => {
    _commUpdateScheduled = false;
    let svg = shell.querySelector('svg.connection-overlay');
    const xmlns = 'http://www.w3.org/2000/svg';
    if (!svg) {
      svg = document.createElementNS(xmlns, 'svg');
      svg.setAttribute('class', 'connection-overlay');
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.setAttribute('aria-hidden', 'true');
      // create defs + marker
      const defs = document.createElementNS(xmlns, 'defs');
      const marker = document.createElementNS(xmlns, 'marker');
      marker.setAttribute('id', 'conn-arrow');
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '8');
      marker.setAttribute('refX', '6');
      marker.setAttribute('refY', '4');
      marker.setAttribute('orient', 'auto');
      marker.setAttribute('markerUnits', 'strokeWidth');
      const mkPath = document.createElementNS(xmlns, 'path');
      mkPath.setAttribute('d', 'M0,0 L8,4 L0,8 L2,4 z');
      mkPath.setAttribute('fill', '#20A6C9');
      marker.appendChild(mkPath);
      defs.appendChild(marker);
      svg.appendChild(defs);
      shell.appendChild(svg);
    }
    const rows = shell.querySelectorAll('.comm-diagram__row');
    if (!svg || rows.length < 2) return;
    const flowRow = rows[0];
    const feedbackRow = rows[1];
    const flowCards = flowRow.querySelectorAll('.comm-flow-card');
    const feedbackCard = feedbackRow.querySelector('.comm-flow-card--feedback') || feedbackRow.querySelector('.comm-flow-card');
    if (!flowCards.length || !feedbackCard) return;
    const sender = flowCards[0];
    const receiver = flowCards[flowCards.length - 1];
    const shellRect = shell.getBoundingClientRect();
    const sRect = sender.getBoundingClientRect();
    const rRect = receiver.getBoundingClientRect();
    const fRect = feedbackCard.getBoundingClientRect();
    const sx = sRect.left + sRect.width * 0.72 - shellRect.left;
    const sy = sRect.bottom - shellRect.top - 4;
    const rx = rRect.left + rRect.width * 0.28 - shellRect.left;
    const ry = rRect.bottom - shellRect.top - 4;
    const fx = fRect.left + fRect.width / 2 - shellRect.left;
    const fy = fRect.top - shellRect.top + 4;
    // Resize svg to shell size
    const w = Math.max(100, Math.ceil(shellRect.width));
    const h = Math.max(100, Math.ceil(shellRect.height));
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    // Remove any existing connector paths (keep defs/marker intact)
    Array.from(svg.querySelectorAll('path')).forEach(p => { if (!p.closest('defs')) p.remove(); });
    // Create two fresh connector paths
    const p1 = document.createElementNS(xmlns, 'path');
    const p2 = document.createElementNS(xmlns, 'path');
    const c1y = fy - 18;
    p1.setAttribute('d', `M ${fx} ${fy} C ${fx - 10} ${c1y} ${sx + 18} ${sy + 8} ${sx} ${sy}`);
    p2.setAttribute('d', `M ${fx} ${fy} C ${fx + 10} ${c1y} ${rx - 18} ${ry + 8} ${rx} ${ry}`);
    p1.setAttribute('stroke-linecap', 'round');
    p2.setAttribute('stroke-linecap', 'round');

  // If we have subheading, prepend it; otherwise use placeholder

    lessonContent = `
      <div class="lesson-placeholder">
        <div class="lesson-placeholder__icon" aria-hidden="true">${m.icon}</div>

        <p class="en">Lesson content will be added soon. Use the navigation buttons to proceed.</p>
      </div>`;
  }

  const html = `
  <article>
    <div class="lesson-body">

        <span class="bn">পাঠ ${lesIdx+1}</span><span class="en">Lesson ${lesIdx+1}</span>
      </div>
      ${lessonContent}
    </div>
  </article>`;
  if (isRichLesson) _renderCache.set(cacheKey, html); // only cache rich content
  document.getElementById('contentArea').innerHTML = html;
  if (isModule24Lesson2) updateCommConnections();
}

          </div>

          <div class="organ-card__icon" aria-hidden="true">🥚</div>
          <h3 class="organ-card__title">
            <span class="bn">ডিম্বাশয় / Ovaries</span>
            <span class="en">Ovaries</span>
          </h3>
        </div>
        <div class="organ-card__body">
          <p class="organ-card__text bn">জরায়ুর দুই পাশে একটি করে মোট দুটি ডিম্বাশয় থাকে। প্রতি ২৮ দিনের মাসিক চক্রের প্রায় মাঝামাঝি সময়ে দুটির মধ্যে একটি ডিম্বাশয়ে একটি পরিপক্ব ডিম্বাণু তৈরি হয়, যা ডিম্বাশয় থেকে বের হয়ে ডিম্ববাহী নালিতে প্রবেশ করে।</p>
          <p class="organ-card__text en">There are two ovaries, one on each side of the uterus. Around the middle of each 28-day menstrual cycle, one of the two ovaries matures an egg (ovum), which is then released from the ovary and enters the fallopian tube.</p>

          <h3 class="organ-card__title">

        <div class="organ-card__body">
          <p class="organ-card__text bn">জরায়ু হলো তলপেটে অবস্থিত একটি ফাঁপা, ত্রিভুজাকৃতি অঙ্গ। এর সামনে থাকে মূত্রথলি এবং পিছনে মলাশয়। জরায়ুর দুটি অংশ — প্রধান অংশ ও জরায়ুমুখ। প্রধান অংশের উপরের দুই কোণ থেকে দুটি ডিম্ববাহী নালি শুরু হয়। জরায়ুর প্রধান কাজ গর্ভধারণে সহায়তা করা। গর্ভধারণ না হলে মাসিক চক্রের হরমোনগত পরিবর্তনে জরায়ুর ভেতরের আস্তরণ বের হয়ে আসে — এটাই মাসিক।</p>
          <p class="organ-card__text en">The uterus is a hollow, triangular-shaped organ located in the lower abdomen. In front of it lies the urinary bladder, and behind it is the rectum. The uterus has two parts: the main body and the cervix (neck of the uterus). From the upper corners of the main body, the two fallopian tubes originate. The primary function of the uterus is to support pregnancy. If pregnancy does not occur, hormonal changes during the menstrual cycle cause the inner lining of the uterus to shed — this is called menstruation.</p>

                <p class="organ-card__text bn">পুষ্টি হলো একটি প্রক্রিয়া। এ প্রক্রিয়াতে খাদ্যবস্তু খাওয়ার পরে পরিপাক হয় এবং জটিল খাদ্য উপাদানগুলো ভেঙ্গে সরল উপাদানে পরিণত হয়। মানবদেহ এসব সরল উপাদান শোষণ করে নেয়। এসব খাদ্য উপাদান মানবদেহের শক্তি ও যথাযথ বৃদ্ধি সাধন করে, মেধা ও বুদ্ধির বিকাশ ঘটায়, রোগ প্রতিরোধ করে এবং সুস্থতা নিশ্চিত করে।</p>
                <p class="organ-card__text en">Nutrition is a process. In this process, food is digested after intake, and complex food components are broken down into simple components. The human body absorbs these simple components. These nutrients provide energy and proper growth, develop intelligence, prevent disease, and ensure overall well-being.</p>
              </div>
            </article>

            <article class="organ-card organ-card--vagina">
              <div class="organ-card__header">
                <span class="organ-card__icon" aria-hidden="true">📈</span>
                <h3 class="organ-card__title">
                  <span class="bn">তারুণ্যে সুষম পুষ্টির প্রয়োজন</span>
                  <span class="en">Need for Balanced Nutrition in Adolescence</span>
                </h3>
              </div>
              <div class="organ-card__body">
                <p class="organ-card__text bn">তারুণ্যে ছেলে-মেয়ে উভয়েরই স্বাভাবিক শারীরিক ও মানসিক পরিবর্তন হয়। দ্রুত ওজন ও উচ্চতার বৃদ্ধি এবং বুদ্ধির বিকাশ ঘটে। তাই তরুন-তরুনীদের সঠিক বৃদ্ধির জন্য এসময় পরিমান মত পুষ্টিকর ও সুষম খাবার গ্রহণ করা প্রয়োজন। সঠিক পুষ্টি নিয়ে বেড়ে উঠলে তরুন-তরুনীদের মেধা ও বুদ্ধির বিকাশ হয়। লেখাপড়ায় মনোযোগ, ভালো ফলাফল এবং কাজ করার সক্ষমতা বৃদ্ধি পায়।</p>
                <p class="organ-card__text en">During adolescence, both boys and girls go through normal physical and mental changes. There is rapid growth in weight and height and development of intelligence. Therefore, adolescents need adequate nutritious and balanced food for proper growth at this time. Proper nutrition supports intellectual development and improves concentration in studies, better results, and work capability.</p>
              </div>

            <article class="organ-card organ-card--breasts">
              <div class="organ-card__header">
                <span class="organ-card__icon" aria-hidden="true">🍎</span>
                <h3 class="organ-card__title">
                  <span class="bn">পুষ্টিকর খাদ্য</span>
                  <span class="en">Nutritious Food</span>
                </h3>
              </div>
              <div class="organ-card__body">
                <p class="organ-card__text bn">যেসব খাদ্য খেলে শরীরে তাপ ও শক্তি উৎপাদিত হয়, দেহের গঠন ও বৃদ্ধি হয়, শরীর সবল, কর্মক্ষম থাকে, তাকে পুষ্টিকর খাদ্য বলে। খাদ্য ও পুষ্টি একে অপরের সাথে জড়িত। প্রতিটি খাদ্য অবশ্যই পুষ্টিকর ও নিরাপদ হতে হবে। নিয়মিত পুষ্টিকর খাদ্য গ্রহণ করলে শরীর ও মন ভালো থাকে, মনে প্রফুল্লতা আসে এবং পড়াশোনা ও কাজে মনোযোগ বাড়ে। মনে রাখতে হবে পুষ্টিকর খাদ্য গ্রহণ না করলে রোগ প্রতিরোধ ক্ষমতা কমে যায় এবং বিভিন্ন রোগে আক্রান্ত হওয়ার ঝুঁকি বেড়ে যায়।</p>
                <p class="organ-card__text en">Foods that produce heat and energy in the body, support body formation and growth, and keep the body strong and active are called nutritious foods. Food and nutrition are closely related. Every food should be nutritious and safe. Regular intake of nutritious food keeps body and mind well, improves mood, and increases concentration in study and work. It is important to remember that without nutritious food, immunity decreases and the risk of various diseases increases.</p>
              </div>
            </article>

            <article class="organ-card organ-card--ovaries">

                  <span class="en">A Standard Measure of Weight and Height Growth</span>
                </h3>
              </div>
              <div class="organ-card__body">
                <p class="organ-card__text bn">বিশ্ব স্বাস্থ্য সংস্থার রেফারেন্স অনুযায়ী বয়সের সাথে সাথে দেহের ওজন ও উচ্চতা বৃদ্ধির একটি আদর্শ মান রয়েছে। যদি কোন শিশু বা তরুন-তরুনীদের উচ্চতার (মিটার এককে) তুলনায় ওজন কম অথবা বয়সের তুলনায় ওজন কম অথবা বয়সের তুলনায় উচ্চতা কম থাকে তাহলে তাকে অপুষ্টি হিসেবে চিহ্নিত করা হয়।</p>
                <p class="organ-card__text en">According to World Health Organization references, there is a standard growth pattern of weight and height with age. If a child or adolescent has low weight relative to height (in meters), low weight for age, or low height for age, they are identified as malnourished.</p>
              </div>
            </article>

            <article class="organ-card organ-card--uterus">
              <div class="organ-card__header">
                <span class="organ-card__icon" aria-hidden="true">📏</span>
                <h3 class="organ-card__title">
                  <span class="bn">ওজন ও উচ্চতা বৃদ্ধির একটি আদর্শ মান</span>
                  <span class="en">A Standard Measure of Weight and Height Growth</span>
                </h3>
              </div>
              <div class="organ-card__body">
                <p class="organ-card__text bn">কোন ব্যক্তির ওজন এবং উচ্চতার হারের বর্গের অনুপাতই হলো বি.এম.আই। এটি পুষ্টিগত অবস্থা নির্ণয়ের একটি উল্লেখযোগ্য পদ্ধতি। বি.এম.আই নির্ণয় করতে ব্যক্তির ওজন কিলোগ্রাম এককে ও উচ্চতা মিটার এককে জানা প্রয়োজন। ওজন কে উচ্চতার বর্গ দিয়ে ভাগ করলেই বি.এম.আই. পাওয়া যাবে।</p>
                <p class="organ-card__text en">The ratio of a person’s weight to the square of height is BMI. It is an important method for determining nutritional status. To calculate BMI, weight in kilograms and height in meters are required. Dividing weight by the square of height gives the BMI value.</p>
              </div>
            </article>
          </div>

          <div class="repro-highlight repro-highlight--teal" style="margin-top:16px;">
            <span class="repro-highlight__icon">🧮</span>
            <div>
              <p class="bn" style="font-size:16px; line-height:1.6; margin:0;"><strong>বি.এম.আই. = ওজন (কিলোগ্রাম) / উচ্চতা (মিটার)²</strong></p>
              <p class="en" style="font-size:16px; line-height:1.6; margin:8px 0 0;"><strong>BMI = Weight (kg) / Height (m)$^2$</strong></p>
            </div>
          </div>
        </section>
        `;
      }

/* ── SIDEBAR TOGGLE ──────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebarToggle');
  if (isMobile()) {
    const open = sidebar.dataset.mobileOpen === 'true';
    if (open) { closeMobileSidebar(); } else {
      sidebar.dataset.mobileOpen = 'true';
      document.getElementById('sidebarOverlay').classList.add('is-visible');
      toggle.setAttribute('aria-expanded', 'true');
    }
  } else {
    const collapsed = sidebar.dataset.collapsed === 'true';
    sidebar.dataset.collapsed = String(!collapsed);
    toggle.setAttribute('aria-expanded', String(collapsed));
    document.getElementById('dashboard').style.gridTemplateColumns =
      collapsed ? '' : '0 1fr';
  }
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.dataset.mobileOpen = 'false';
  document.getElementById('sidebarOverlay').classList.remove('is-visible');
  document.getElementById('sidebarToggle').setAttribute('aria-expanded', 'false');
}

/* ── LANGUAGE ────────────────────────────────────── */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang === 'bn' ? 'bn' : 'en');
  document.getElementById('btnBn').setAttribute('aria-pressed', String(lang === 'bn'));
  document.getElementById('btnEn').setAttribute('aria-pressed', String(lang === 'en'));
  syncBottomLabel();
}

/* ── THEME ───────────────────────────────────────── */
function toggleTheme() {
  const html   = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  const btn = document.getElementById('themeBtn');
  btn.textContent = isDark ? '☀️' : '🌙';
  btn.setAttribute('aria-label', isDark ? 'Switch to dark mode' : 'Switch to light mode');
}

/* ── KEYBOARD ────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isMobile()) closeMobileSidebar();
});
