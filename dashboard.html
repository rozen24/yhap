
<!DOCTYPE html>
<html lang="bn" data-lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YHAP Dashboard – যুব স্বাস্থ্য দূত কর্মসূচি</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="shortcut icon" href="unicef.png" type="image/x-icon">
  <!-- Load fonts non-render-blocking via print media trick -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" /></noscript>
  <style>
    /* ============================================================
       DESIGN TOKENS
    ============================================================ */
    :root {
      --color-blue:       #1CABE2;
      --color-blue-dark:  #00689D;
      --color-navy:       #0D47A1;
      --color-cyan:       #69CEEC;
      --color-blue-tint:  #E8F6FC;
      --color-yellow:     #FFC20E;
      --color-green:      #2ECC71;
      --color-green-dark: #27AE60;

      --bg:        #F0F4F8;
      --surface:   #FFFFFF;
      --surface-2: #F7FAFC;
      --border:    #D1E3EF;

      --text-primary:   #0D1B2A;
      --text-secondary: #3D5A6C;
      --text-muted:     #7A9AAD;

      --sidebar-bg:     #0A1929;
      --sidebar-text:   rgba(255,255,255,0.85);
      --sidebar-muted:  rgba(255,255,255,0.45);
      --sidebar-hover:  rgba(255,255,255,0.06);
      --sidebar-active: rgba(28,171,226,0.15);
      --sidebar-border: rgba(255,255,255,0.04);

      --shadow-sm: 0 2px 12px rgba(13,71,161,0.08);
      --shadow-md: 0 6px 24px rgba(13,71,161,0.12);

      --radius:    12px;
      --radius-sm:  8px;
      --ease:      cubic-bezier(0.4,0,0.2,1);
      --dur:       0.25s;

      --sidebar-w: 320px;
      --topbar-h:  56px;
    }

    [data-theme="dark"] {
      --bg:             #060F1A;
      --surface:        #0D2137;
      --surface-2:      #0A1929;
      --border:         #1A3D57;
      --text-primary:   #E8F4FB;
      --text-secondary: #93C5DA;
      --text-muted:     #5D8FA8;
      --shadow-sm:      0 2px 12px rgba(0,0,0,0.4);
      --shadow-md:      0 6px 24px rgba(0,0,0,0.5);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      font-family: 'Hind Siliguri', 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow-x: hidden;
    }
    body.transitions-ready {
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }

    /* Language visibility */
    [data-lang="en"] .bn, [data-lang="bn"] .en { display: none !important; }
    [data-lang="en"] .en, [data-lang="bn"] .bn { display: revert !important; }

    /* Bengali font for semantic elements */
    [data-lang="bn"] p.bn,
    [data-lang="bn"] h2.bn,
    [data-lang="bn"] h3.bn,
    [data-lang="bn"] h4.bn,
    [data-lang="bn"] h5.bn,
    [data-lang="bn"] h6.bn,
    [data-lang="bn"] span.bn {
      font-family: 'Noto Serif Bengali', serif;
    }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .d-none { display: none !important; }
    .l-dashboard {
      display: grid;
      grid-template-areas: "topbar topbar" "sidebar main";
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: var(--topbar-h) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ============================================================
       TOP BAR
    ============================================================ */
    .topbar {
      grid-area: topbar;
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      gap: 12px;
      padding-inline-end: 16px;
      border-bottom: 1px solid rgba(28,171,226,0.15);
      z-index: 200;
    }

    .topbar__toggle {
      flex-shrink: 0;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--color-blue), var(--color-navy));
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity var(--dur);
    }
    .topbar__toggle:hover { opacity: 0.88; }
    .topbar__toggle svg { width: 16px; height: 16px; flex-shrink: 0; }

    .topbar__progress {
      flex: 1;
      max-width: 380px;
      margin-inline: auto;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .progress-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .progress-label strong { color: var(--color-cyan); }
    .progress-track {
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-blue), var(--color-cyan));
      border-radius: 3px;
      transition: width 0.6s var(--ease);
    }
    .progress-sub {
      margin-top: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .progress-sub strong { color: var(--color-cyan); }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto; /* always push to far right */
    }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      transition: background var(--dur), color var(--dur);
    }
    .ghost-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .lang-switcher {
      display: flex;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
    }
    .lang-switcher__btn {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      transition: background var(--dur), color var(--dur);
      border-radius: 18px;
    }
    .lang-switcher__btn[aria-pressed="true"] { background: var(--color-blue); color: #fff; }

    .theme-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--dur);
    }
    .theme-btn:hover { background: rgba(255,255,255,0.15); }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-blue), var(--color-navy));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
      border: 2px solid rgba(255,255,255,0.2);
      user-select: none;
    }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    .sidebar {
      grid-area: sidebar;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-inline-end: 1px solid rgba(28,171,226,0.1);
      /* Desktop width collapse */
      transition: width var(--dur) var(--ease);
      will-change: width;
    }
    .sidebar[data-collapsed="true"] {
      width: 0;
      border-inline-end-width: 0;
    }

    .sidebar__scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(28,171,226,0.3) transparent;
    }
    .sidebar__scroll::-webkit-scrollbar       { width: 4px; }
    .sidebar__scroll::-webkit-scrollbar-thumb { background: rgba(28,171,226,0.3); border-radius: 2px; }

    /* ── Module group ── */
    .module-group { border-bottom: 1px solid var(--sidebar-border); contain: layout style; }

    .module-trigger {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      text-align: start;
      font-family: inherit;
      transition: background var(--dur);
    }
    .module-trigger:hover               { background: var(--sidebar-hover); }
    .module-trigger[aria-expanded="true"] { background: rgba(28,171,226,0.08); }
    .module-trigger.is-active           { background: rgba(28,171,226,0.1); }

    .module-status {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      margin-top: 1px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      transition: background var(--dur), border-color var(--dur), color var(--dur);
    }
    .module-status[data-state="done"]   { background: var(--color-green);  border-color: var(--color-green);  color: #fff; }
    .module-status[data-state="active"] { background: var(--color-blue);   border-color: var(--color-blue);   color: #fff; }

    .module-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .module-title {
      font-size: 12.5px; font-weight: 700;
      color: var(--sidebar-text);
      line-height: 1.4; margin-bottom: 5px;
    }
    .module-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700;
      color: var(--color-cyan);
      background: rgba(28,171,226,0.15);
      border: 1px solid rgba(28,171,226,0.3);
      margin-top: 4px; margin-bottom: 6px;
      align-self: flex-start;
      white-space: nowrap;
    }
    .module-progress {
      display: flex; align-items: center; gap: 6px; margin-top: 6px;
    }
    .module-progress__track {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .module-progress__fill {
      height: 100%; background: var(--color-blue); border-radius: 2px;
      transition: width 0.5s var(--ease);
    }
    .module-progress__label { font-size: 10px; color: var(--sidebar-muted); white-space: nowrap; }

    .module-chevron {
      flex-shrink: 0;
      width: 16px; height: 16px;
      color: var(--sidebar-muted);
      margin-top: 4px;
      transition: transform var(--dur) var(--ease);
    }
    .module-trigger[aria-expanded="true"] .module-chevron { transform: rotate(180deg); }

    /* ── Lesson list (accordion panel) ── */
    .lesson-list {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s var(--ease);
      content-visibility: hidden;
    }
    .lesson-list[data-open="true"] {
      content-visibility: visible;
    }

    .lesson-btn {
      width: 100%;
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 16px 10px 20px;
      border-inline-start: 2px solid transparent;
      background: transparent;
      text-align: start;
      font-family: inherit;
      transition: background var(--dur), border-color var(--dur);
    }
    .lesson-btn:hover { background: rgba(255,255,255,0.04); }
    .lesson-btn.is-active {
      background: var(--sidebar-active);
      border-inline-start-color: var(--color-blue);
    }

    .lesson-dot {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border-radius: 50%;
      margin-top: 1px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      transition: background var(--dur), border-color var(--dur), color var(--dur);
    }
    .lesson-dot[data-state="done"]   { background: var(--color-green); border-color: var(--color-green); color: #fff; font-size: 10px; }
    .lesson-dot[data-state="active"] { background: var(--color-blue);  border-color: var(--color-blue);  color: #fff; font-size: 10px; }

    .lesson-text { flex: 1; min-width: 0; }
    .lesson-label {
      font-size: 12px; font-weight: 500;
      color: var(--sidebar-muted);
      line-height: 1.4;
      transition: color var(--dur);
    }
    .lesson-btn:hover     .lesson-label { color: var(--sidebar-text); }
    .lesson-btn.is-active .lesson-label { color: var(--color-cyan); font-weight: 600; }

    .lesson-current-badge {
      display: inline-block; margin-top: 3px;
      padding: 1px 6px; border-radius: 8px;
      font-size: 9px; font-weight: 700;
      color: var(--color-cyan);
      background: rgba(28,171,226,0.15);
      border: 1px solid rgba(28,171,226,0.3);
    }

    /* ============================================================
       MAIN CONTENT
    ============================================================ */
    .main {
      grid-area: main;
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      outline: none; /* focus ring suppressed; moved to lesson-body */
      contain: layout style;
    }
    .content-area::-webkit-scrollbar       { width: 5px; }
    .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ============================================================
       MODULE OVERVIEW
    ============================================================ */
    .module-hero {
      position: relative;
      overflow: hidden;
      padding: 44px 48px;
      background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-blue-dark) 55%, #0097A7 100%);
    }
    .module-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 70% 50%, rgba(28,171,226,0.18) 0%, transparent 60%);
      pointer-events: none;
    }
    .module-hero__inner { position: relative; z-index: 1; max-width: 680px; }

    .module-tag {
      display: inline-flex; align-items: center; gap: 7px;
      margin-bottom: 14px; padding: 5px 14px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    }
    .module-tag__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-cyan);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.5); }
    }

    .module-hero__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(20px, 2.8vw, 32px);
      font-weight: 700; color: #fff; line-height: 1.35; margin-bottom: 14px;
    }
    .module-hero__desc {
      font-size: 15px; line-height: 1.75;
      color: rgba(255,255,255,0.82); max-width: 580px;
    }
    .module-hero__stats {
      display: flex; flex-wrap: wrap; gap: 24px; margin-top: 26px;
    }
    .stat { text-align: center; }
    .stat__num   { font-size: 26px; font-weight: 800; color: var(--color-yellow); line-height: 1; }
    .stat__label { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 3px; }

    .module-hero__deco {
      position: absolute; inset-inline-end: 48px; top: 50%; transform: translateY(-50%);
      width: 148px; height: 148px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 68px; z-index: 1; pointer-events: none;
    }

    .module-lessons { padding: 32px 40px; }

    .section-heading {
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .lesson-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden;
      transition: transform var(--dur), box-shadow var(--dur), border-color var(--dur);
    }
    .lesson-card::before {
      content: ''; position: absolute;
      inset-block-start: 0; inset-inline: 0; height: 3px;
      background: var(--color-blue);
      transform: scaleX(0); transform-origin: left;
      transition: transform var(--dur);
    }
    .lesson-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--color-blue); }
    .lesson-card:hover::before { transform: scaleX(1); }
    .lesson-card.is-done::before   { transform: scaleX(1); background: var(--color-green); }
    .lesson-card.is-active::before { transform: scaleX(1); }

    .card-header { display: flex; align-items: center; justify-content: space-between; }
    .card-num {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: var(--color-blue-tint); color: var(--color-blue-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    [data-theme="dark"] .card-num { background: rgba(28,171,226,0.15); color: var(--color-cyan); }

    .card-status {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--surface-2); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 11px;
      transition: background var(--dur), border-color var(--dur), color var(--dur);
    }
    .card-status[data-state="done"]   { background: var(--color-green); border-color: var(--color-green); color: #fff; }
    .card-status[data-state="active"] { background: var(--color-blue);  border-color: var(--color-blue);  color: #fff; }

    .card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4; flex: 1; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .card-meta {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-muted);
    }
    .card-meta svg { width: 11px; height: 11px; }

    .card-cta {
      font-size: 11px; font-weight: 700; color: var(--color-blue);
      display: flex; align-items: center; gap: 3px;
      padding: 4px 10px; border-radius: 14px;
      background: var(--color-blue-tint);
      border: 1px solid transparent;
      transition: gap var(--dur), background var(--dur), border-color var(--dur);
    }
    .card-cta:hover { gap: 6px; border-color: var(--color-blue); }
    .card-cta.is-done { color: var(--color-green-dark); background: rgba(46,204,113,0.1); }
    [data-theme="dark"] .card-cta { background: rgba(28,171,226,0.12); }

    /* ============================================================
       LESSON PAGE
    ============================================================ */
    .lesson-page { height: 100%; display: flex; flex-direction: column; }

    .lesson-topbar {
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
      padding: 10px 28px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      min-width: 0; width: 100%;
    }
    .breadcrumb__link {
      color: var(--color-blue); font-weight: 600;
      background: none; border: none; font-family: inherit; font-size: inherit;
      cursor: pointer; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 100%;
      transition: opacity var(--dur);
    }
    .breadcrumb__link:hover { opacity: 0.75; }
    .breadcrumb__sep     { color: var(--border); flex-shrink: 0; }
    .breadcrumb__current {
      font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Nav buttons always on their own full-width row */
    .lesson-nav {
      display: flex; gap: 8px;
      width: 100%;
    }
    .lesson-nav .nav-btn {
      flex: 1;
      justify-content: center;
      min-width: 0;
    }

    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: background var(--dur), color var(--dur), border-color var(--dur), transform var(--dur);
    }
    .nav-btn:hover {
      background: var(--color-navy);
      color: #ffffff;
      border-color: var(--color-navy);
    }
    [data-theme="dark"] .nav-btn:hover {
      background: var(--color-blue-dark);
      color: #ffffff;
      border-color: var(--color-blue-dark);
    }
    .nav-btn--primary {
      background: linear-gradient(135deg, var(--color-blue), var(--color-blue-dark));
      color: #fff; border-color: transparent;
    }
    .nav-btn--primary:hover { opacity: 0.9; transform: translateY(-1px); color: #fff; }

    .lesson-body {
      flex: 1; padding: 36px 48px;
      overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .lesson-body::-webkit-scrollbar       { width: 5px; }
    .lesson-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .lesson-heading {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(20px, 2.8vw, 28px); font-weight: 700;
      color: var(--text-primary); line-height: 1.4; margin-bottom: 8px;
    }
    .lesson-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); margin-bottom: 28px;
    }
    .lesson-meta__dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

    .lesson-placeholder {
      background: var(--surface); border: 1.5px dashed var(--border);
      border-radius: var(--radius); padding: 56px 36px;
      text-align: center; color: var(--text-muted);
    }
    .lesson-placeholder__icon { font-size: 48px; margin-bottom: 14px; }
    .lesson-placeholder h2 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; }
    .lesson-placeholder p  { font-size: 14px; line-height: 1.65; max-width: 380px; margin-inline: auto; }

    /* ============================================================
       GLOBE CONTENT SECTION
    ============================================================ */
    .globe-section {
      position: relative;
      width: 100%;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(160deg, #051525 0%, #0a2540 50%, #0d3d6b 100%);
      margin-bottom: 28px;
    }

    /* Animated starfield background - uses transform to avoid paint */
    .globe-section::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 200px 200px, 130px 130px, 80px 80px;
      background-position: 0 0, 60px 40px, 20px 90px;
      animation: starDrift 40s linear infinite;
      opacity: 0.6;
      will-change: transform;
    }
    @keyframes starDrift {
      from { transform: translate(0, 0); }
      to   { transform: translate(200px, 200px); }
    }

    /* Globe wrapper */
    .globe-wrap {
      position: relative;
      width: min(340px, 80vw);
      height: min(340px, 80vw);
      flex-shrink: 0;
    }

    /* Glowing halo behind the globe */
    .globe-wrap::before {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(28,171,226,0.25) 0%, transparent 70%);
      animation: pulseGlow 4s ease-in-out infinite;
      will-change: transform, opacity;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.1); opacity: 1;   }
    }

    /* SVG globe rotation */
    .globe-svg {
      width: 100%; height: 100%;
      border-radius: 50%;
      animation: rotateSlow 30s linear infinite;
      filter: drop-shadow(0 0 24px rgba(28,171,226,0.5));
      will-change: transform;
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Floating orbit ring */
    .globe-orbit {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(28,171,226,0.3);
      animation: orbitSpin 20s linear infinite;
      pointer-events: none;
      will-change: transform;
    }
    .globe-orbit::after {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-cyan, #69CEEC);
      transform: translateX(-50%);
      box-shadow: 0 0 8px var(--color-cyan, #69CEEC);
    }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    /* Stat bubble */
    .globe-stat {
      position: absolute;
      top: -20px;
      right: -28px;
      background: linear-gradient(135deg, var(--color-blue, #1CABE2), var(--color-blue-dark, #00689D));
      color: #fff;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 800;
      font-size: clamp(20px, 5vw, 32px);
      line-height: 1;
      box-shadow: 0 4px 20px rgba(28,171,226,0.4);
      animation: floatBubble 3s ease-in-out infinite;
      white-space: nowrap;
      will-change: transform;
    }
    .globe-stat span {
      display: block;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.85;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }
    @keyframes floatBubble {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-8px); }
    }

    /* Text overlay */
    .globe-text-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 28px 20px;
      background: linear-gradient(to top, rgba(5,21,37,0.92) 0%, rgba(5,21,37,0.5) 50%, transparent 100%);
      border-radius: var(--radius);
    }
    .globe-quote {
      font-size: clamp(13px, 2vw, 16px);
      line-height: 1.75;
      color: rgba(255,255,255,0.92);
      text-align: center;
      max-width: 600px;
      font-family: 'Hind Siliguri', 'Plus Jakarta Sans', sans-serif;
    }
    .globe-quote strong {
      color: var(--color-cyan, #69CEEC);
      font-size: clamp(16px, 3vw, 22px);
      display: block;
      margin-bottom: 8px;
    }

    /* Full layout: globe left, text right on wide screens */
    @media (min-width: 700px) {
      .globe-section {
        min-height: 360px;
        flex-direction: row;
        gap: 32px;
        padding: 40px 48px;
        align-items: center;
        justify-content: center;
      }
      .globe-text-wrap {
        position: static;
        background: none;
        padding: 0;
        border-radius: 0;
        align-items: flex-start;
        text-align: left;
        flex: 1;
        max-width: 420px;
      }
      .globe-quote { text-align: left; }
    }
    @media (max-width: 699px) {
      .globe-section { min-height: 380px; padding: 0; flex-direction: column; }
      .globe-wrap { margin-top: 28px; }
      .globe-stat { top: -12px; right: -12px; font-size: clamp(18px, 6vw, 26px); }
    }

    /* ============================================================
       WORLD MAP SECTION
    ============================================================ */
    .map-section {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .map-section-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
    }
    .map-section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .map-section-title::before {
      content: '';
      display: inline-block;
      width: 4px; height: 16px;
      border-radius: 2px;
      background: var(--color-blue, #1CABE2);
      flex-shrink: 0;
    }

    /* Map container — maintains 2:1 aspect ratio */
    .map-container {
      position: relative;
      width: 100%;
      /* viewBox is 1000×500 — 2:1 ratio */
      aspect-ratio: 1000 / 500;
      min-height: 220px;
      background: #C8E6F5;
      overflow: hidden;
    }

    /* The SVG fills the container */
    .map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Region label chips — positioned absolutely in % so they scale */
    .map-label {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: default;
      transform: translate(-50%, -50%);
      transition: transform 0.22s ease, filter 0.22s ease;
      z-index: 2;
      /* Connector dot */
    }
    .map-label::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--lc, #1CABE2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.6), 0 0 10px var(--lc, #1CABE2);
      margin-bottom: 4px;
      flex-shrink: 0;
      transition: box-shadow 0.22s ease;
    }
    .map-label:hover { transform: translate(-50%, -50%) scale(1.12); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); }
    .map-label:hover::before { box-shadow: 0 0 0 4px rgba(255,255,255,0.8), 0 0 18px var(--lc, #1CABE2); }

    .map-chip {
      background: var(--lc, #1CABE2);
      color: #fff;
      border-radius: 20px;
      padding: 4px 10px 3px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      line-height: 1.3;
      text-align: center;
    }
    .map-chip-pct {
      display: block;
      font-size: clamp(11px, 1.4vw, 15px);
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .map-chip-name {
      display: block;
      font-size: clamp(8px, 0.9vw, 11px);
      font-weight: 500;
      opacity: 0.92;
    }

    /* Legend strip */
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding: 12px 24px 16px;
      border-top: 1px solid var(--border);
    }
    .map-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .map-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .map-container { min-height: 160px; }
      .map-legend    { padding: 10px 16px 12px; gap: 6px 12px; }
      .map-section-header { padding: 14px 16px 10px; }
    }

    /* ============================================================
       BOTTOM NAV
    ============================================================ */
    .bottom-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .bottom-nav__info {
      font-size: 12px; color: var(--text-muted);
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bottom-nav__info strong { color: var(--text-secondary); }
    .bottom-nav__btns {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Mobile: fixed bottom bar so Prev/Next always visible */
    @media (max-width: 900px) {
      .bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 100;
        padding: 10px 16px;
        padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        gap: 8px;
      }
      /* Buttons share width equally — no overflow */
      .bottom-nav__btns {
        flex: 1;
        display: flex;
        flex-direction: row;
        gap: 10px;
        width: 100%;
        min-width: 0;
      }
      .bottom-nav__btns .nav-btn {
        flex: 1;
        justify-content: center;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* Prevent content being hidden behind the fixed bar */
      .content-area { padding-bottom: 80px; }
    }

    /* ============================================================
       SIDEBAR OVERLAY
    ============================================================ */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 190;
      background: rgba(0,0,0,0.55);
    }
    .sidebar-overlay.is-visible { display: block; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 900px) {
      :root { --sidebar-w: 290px; }

      .l-dashboard {
        grid-template-columns: 1fr;
        grid-template-areas: "topbar" "main";
      }

      /* Sidebar becomes fixed overlay drawer */
      .sidebar {
        position: fixed;
        inset-block-start: var(--topbar-h);
        inset-inline-start: 0;
        width: var(--sidebar-w);
        height: calc(100vh - var(--topbar-h));
        z-index: 200;
        /* Override width transition; use transform instead */
        transform: translateX(-100%);
        transition: transform var(--dur) var(--ease);
        will-change: transform;
      }
      .sidebar[data-mobile-open="true"] { transform: translateX(0); }

      .module-hero       { padding: 28px 24px; }
      .module-hero__deco { display: none; }
      .module-lessons    { padding: 24px 20px; }
      .lesson-body       { padding: 24px 20px; }
    }

    @media (max-width: 600px) {
      .topbar__progress { display: none; }
      .theme-btn { display: none; }
      .lang-switcher { display: none; }
      .lesson-grid { grid-template-columns: 1fr; }
      .lesson-topbar { padding: 8px 14px; }
      .lesson-body   { padding: 16px; }
      .bottom-nav    { padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
      .bottom-nav__info { display: none; }
      .bottom-nav__btns { flex: 1; width: 100%; }
      .bottom-nav__btns .nav-btn { flex: 1; justify-content: center; }
      .module-hero   { padding: 20px 16px; }
      .module-lessons { padding: 14px; }
    }

    /* ============================================================
       ADOLESCENT CHANGES CARDS
    ============================================================ */
    .changes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 4px;
    }

    .change-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .change-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .change-card__header {
      padding: 22px 20px 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .change-card--boys .change-card__header {
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
    }
    .change-card--girls .change-card__header {
      background: linear-gradient(135deg, #880E4F 0%, #AD1457 50%, #C2185B 100%);
    }
    .change-card--mental .change-card__header {
      background: linear-gradient(135deg, #1A237E 0%, #283593 50%, #3949AB 100%);
    }

    .change-card__header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 110% 110%, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .change-card__icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 1;
    }

    .change-card__title {
      font-size: 14.5px;
      font-weight: 700;
      color: #fff;
      line-height: 1.35;
      position: relative;
      z-index: 1;
    }

    .change-card__count {
      font-size: 10.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      position: relative;
      z-index: 1;
    }

    .change-card__body {
      padding: 16px 18px 20px;
      flex: 1;
    }

    .change-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .change-item:last-child { border-bottom: none; }

    .change-item__icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .change-card--boys   .change-item__icon { background: rgba(13,71,161,0.10); }
    .change-card--girls  .change-item__icon { background: rgba(136,14,79,0.10); }
    .change-card--mental .change-item__icon { background: rgba(26,35,126,0.10); }
    [data-theme="dark"] .change-card--boys   .change-item__icon { background: rgba(28,171,226,0.12); }
    [data-theme="dark"] .change-card--girls  .change-item__icon { background: rgba(194,24,91,0.15); }
    [data-theme="dark"] .change-card--mental .change-item__icon { background: rgba(57,73,171,0.15); }

    .change-item__text {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
      min-width: 0;
    }

    @media (max-width: 900px) {
      .changes-grid { grid-template-columns: 1fr; gap: 16px; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .change-card__title { font-size: 13.5px; }
      .change-item__text  { font-size: 12.5px; }
    }
    /* ============================================================
       ADOLESCENT STAGES TIMELINE SECTION (Module 2, Lesson 2)
    ============================================================ */

    /* Section wrapper */
    .stages-section { display: flex; flex-direction: column; gap: 14px; }

    /* Category block */
    .stage-category {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    /* Category header bar */
    .stage-category__header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-blue-dark) 60%, var(--color-blue) 100%);
      position: relative;
      overflow: hidden;
    }
    .stage-category__header::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 90% 50%, rgba(255,255,255,0.10) 0%, transparent 65%);
      pointer-events: none;
    }
    .stage-category__icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .stage-category__title {
      font-size: 14px; font-weight: 700;
      color: #fff;
      position: relative; z-index: 1;
    }

    /* 3-column stage grid inside each category */
    .stage-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    /* Each age-stage column */
    .stage-col {
      padding: 16px 18px;
      border-inline-end: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .stage-col:last-child { border-inline-end: none; }

    /* Column label (Early / Middle / Late) */
    .stage-col__label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .stage-col--early  .stage-col__label { color: #00796B; border-bottom-color: #00796B; }
    .stage-col--middle .stage-col__label { color: #1565C0; border-bottom-color: #1565C0; }
    .stage-col--late   .stage-col__label { color: #6A1B9A; border-bottom-color: #6A1B9A; }
    [data-theme="dark"] .stage-col--early  .stage-col__label { color: #4DB6AC; border-bottom-color: #4DB6AC; }
    [data-theme="dark"] .stage-col--middle .stage-col__label { color: var(--color-cyan); border-bottom-color: var(--color-cyan); }
    [data-theme="dark"] .stage-col--late   .stage-col__label { color: #CE93D8; border-bottom-color: #CE93D8; }

    .stage-col__dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: currentColor;
    }

    /* Individual bullet item */
    .stage-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0;
      font-size: 12.5px; line-height: 1.5;
      color: var(--text-secondary);
    }
    .stage-item::before {
      content: '›';
      font-size: 14px; font-weight: 700; line-height: 1.35;
      flex-shrink: 0;
      margin-top: 0;
    }
    .stage-col--early  .stage-item::before { color: #00796B; }
    .stage-col--middle .stage-item::before { color: #1565C0; }
    .stage-col--late   .stage-item::before { color: #6A1B9A; }
    [data-theme="dark"] .stage-col--early  .stage-item::before { color: #4DB6AC; }
    [data-theme="dark"] .stage-col--middle .stage-item::before { color: var(--color-cyan); }
    [data-theme="dark"] .stage-col--late   .stage-item::before { color: #CE93D8; }

    /* Age badge chips row above sections */
    .stages-legend {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }
    .stages-legend__chip {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px; font-weight: 700;
      border: 1.5px solid;
    }
    .stages-legend__chip--early  {
      background: rgba(0,121,107,0.08); color: #00796B;
      border-color: rgba(0,121,107,0.25);
    }
    .stages-legend__chip--middle {
      background: rgba(21,101,192,0.08); color: #1565C0;
      border-color: rgba(21,101,192,0.25);
    }
    .stages-legend__chip--late   {
      background: rgba(106,27,154,0.08); color: #6A1B9A;
      border-color: rgba(106,27,154,0.25);
    }
    [data-theme="dark"] .stages-legend__chip--early  { background: rgba(0,121,107,0.15); color: #4DB6AC; border-color: rgba(77,182,172,0.3); }
    [data-theme="dark"] .stages-legend__chip--middle { background: rgba(28,171,226,0.12); color: var(--color-cyan); border-color: rgba(28,171,226,0.3); }
    [data-theme="dark"] .stages-legend__chip--late   { background: rgba(106,27,154,0.15); color: #CE93D8; border-color: rgba(206,147,216,0.3); }

    .stages-legend__icon { font-size: 16px; }
    .stages-legend__text { font-size: 12.5px; font-weight: 700; }
    .stages-legend__age  { font-size: 10.5px; font-weight: 500; opacity: 0.75; }

    /* Responsive — stack to 1 col on mobile */
    @media (max-width: 900px) {
      .stage-cols      { grid-template-columns: 1fr; }
      .stages-legend   { grid-template-columns: 1fr; }
      .stage-col       { border-inline-end: none; border-bottom: 1px solid var(--border); }
      .stage-col:last-child { border-bottom: none; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .stage-item       { font-size: 11.5px; }
      .stage-col        { padding: 12px 12px; }
    }

    /* ============================================================
       FEMALE REPRODUCTIVE SYSTEM & MENSTRUAL CYCLE (Module 3)
    ============================================================ */

    /* Two-panel split layout for repro system lesson */
    .repro-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) { .repro-layout { grid-template-columns: 1fr; } }

    /* Shared organ/info card */
    .repro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .repro-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

    .repro-card__header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      position: relative; overflow: hidden;
    }
    .repro-card__header--rose {
      background: linear-gradient(135deg, #880E4F 0%, #C2185B 60%, #E91E8C 100%);
    }
    .repro-card__header--teal {
      background: linear-gradient(135deg, #00695C 0%, #00897B 60%, #26A69A 100%);
    }
    .repro-card__header--violet {
      background: linear-gradient(135deg, #4527A0 0%, #5E35B1 60%, #7E57C2 100%);
    }
    .repro-card__header--navy {
      background: linear-gradient(135deg, #0D47A1 0%, #1565C0 60%, #1976D2 100%);
    }
    .repro-card__header::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 85% 30%, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .repro-card__icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0; position: relative; z-index: 1;
    }
    .repro-card__title {
      font-size: 15px; font-weight: 700; color: #fff;
      position: relative; z-index: 1; line-height: 1.3;
    }
    .repro-card__subtitle {
      font-size: 11px; color: rgba(255,255,255,0.72);
      font-weight: 500; margin-top: 2px;
    }
    .repro-card__body { padding: 16px 18px; }
    .repro-card__body p {
      font-size: 13px; line-height: 1.7; color: var(--text-secondary);
    }
    .repro-card__body p + p { margin-top: 10px; }

    /* Organ list inside anatomy panel */
    .organ-list { display: flex; flex-direction: column; gap: 10px; }
    .organ-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color var(--dur), background var(--dur);
    }
    .organ-item:hover { border-color: var(--color-blue); background: var(--color-blue-tint); }
    [data-theme="dark"] .organ-item:hover { background: rgba(28,171,226,0.08); }
    .organ-item__icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .organ-item__icon--rose   { background: rgba(136,14,79,0.10); }
    .organ-item__icon--teal   { background: rgba(0,105,92,0.10); }
    .organ-item__icon--violet { background: rgba(69,39,160,0.10); }
    .organ-item__icon--blue   { background: rgba(13,71,161,0.10); }
    [data-theme="dark"] .organ-item__icon--rose   { background: rgba(194,24,91,0.15); }
    [data-theme="dark"] .organ-item__icon--teal   { background: rgba(0,137,123,0.15); }
    [data-theme="dark"] .organ-item__icon--violet { background: rgba(94,53,177,0.15); }
    [data-theme="dark"] .organ-item__icon--blue   { background: rgba(28,171,226,0.12); }
    .organ-item__content { flex: 1; min-width: 0; }
    .organ-item__name {
      font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px;
    }
    .organ-item__desc {
      font-size: 12px; line-height: 1.6; color: var(--text-secondary);
    }

    /* Info highlight box */
    .repro-highlight {
      display: flex; gap: 12px; align-items: center;
      padding: 14px 16px;
      border-radius: 10px;
      border-left: 4px solid;
      margin-top: 12px;
      font-size: 12.5px; line-height: 1.65; color: var(--text-secondary);
    }
    .repro-highlight--rose   { background: rgba(136,14,79,0.06);  border-color: #C2185B; }
    .repro-highlight--teal   { background: rgba(0,105,92,0.06);   border-color: #00897B; }
    .repro-highlight--violet { background: rgba(69,39,160,0.06);  border-color: #5E35B1; }
    .repro-highlight--amber  { background: rgba(245,127,23,0.06); border-color: #FB8C00; }
    [data-theme="dark"] .repro-highlight--rose   { background: rgba(194,24,91,0.08); }
    [data-theme="dark"] .repro-highlight--teal   { background: rgba(0,137,123,0.08); }
    [data-theme="dark"] .repro-highlight--violet { background: rgba(94,53,177,0.08); }
    [data-theme="dark"] .repro-highlight--amber  { background: rgba(251,140,0,0.08); }
    .repro-highlight__icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

    /* Section label above a group of cards */
    .repro-section-title {
      font-size: 16px; font-weight: 800; color: var(--text-primary);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .repro-section-title::before {
      content: ''; display: block;
      width: 5px; height: 20px; border-radius: 3px; flex-shrink: 0;
    }
    .repro-section-title--rose::before   { background: #C2185B; }
    .repro-section-title--teal::before   { background: #00897B; }

    /* Menstrual cycle stat chips */
    .cycle-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .cycle-stats { grid-template-columns: 1fr; } }

    .cycle-stat {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid;
      text-align: center;
      transition: transform var(--dur), box-shadow var(--dur);
    }
    .cycle-stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .cycle-stat--rose   { background: rgba(136,14,79,0.07);  border-color: rgba(194,24,91,0.25);  }
    .cycle-stat--teal   { background: rgba(0,105,92,0.07);   border-color: rgba(0,137,123,0.25);  }
    .cycle-stat--amber  { background: rgba(245,127,23,0.07); border-color: rgba(251,140,0,0.25);  }
    [data-theme="dark"] .cycle-stat--rose  { background: rgba(194,24,91,0.10); }
    [data-theme="dark"] .cycle-stat--teal  { background: rgba(0,137,123,0.10); }
    [data-theme="dark"] .cycle-stat--amber { background: rgba(251,140,0,0.10); }
    .cycle-stat__icon  { font-size: 22px; margin-bottom: 6px; }
    .cycle-stat__value { font-size: 18px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
    .cycle-stat__label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 3px; }

    /* Phase timeline */
    .phase-timeline { display: flex; flex-direction: column; gap: 10px; }
    .phase-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      transition: border-color var(--dur), transform var(--dur);
    }
    .phase-item:hover { border-color: var(--color-blue); transform: translateX(3px); }
    .phase-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .phase-num--rose   { background: #C2185B; }
    .phase-num--amber  { background: #FB8C00; }
    .phase-num--teal   { background: #00897B; }
    .phase-num--violet { background: #5E35B1; }
    .phase-content__title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
    .phase-content__desc  { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }

    /* ============================================================
       MENSTRUAL CYCLE DIAGRAM LAYOUT
    ============================================================ */
    /* 28-Day cycle reference image (now used inside a repro-card body) */
    .mc-cycle-image-frame {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mc-cycle-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }
    [data-theme="dark"] .mc-cycle-image-frame {
      background: #FFFFFF; /* keep illustration crisp on dark theme */
    }
    .mc-cycle-caption {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.55;
    }
    @media (max-width: 600px) {
      .mc-cycle-image-frame { padding: 6px; border-radius: 12px; }
    }

    /* ── Phases + Anatomy two-column layout (Module 3 Lesson 1) ── */
    .phases-anatomy-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
      margin-top: 20px;
    }
    .phases-anatomy-row > .repro-card {
      margin: 0; /* override any default card margin inside the grid */
    }
    @media (max-width: 960px) {
      .phases-anatomy-row {
        grid-template-columns: 1fr;
      }
    }

    /* ── Anatomy reference card (Module 3 Lesson 1) ── */
    .anatomy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .anatomy-card__header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #EA580C 0%, #F97316 55%, #FB923C 100%);
      color: #fff;
      display: flex; align-items: center; gap: 12px;
    }
    .anatomy-card__icon {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .anatomy-card__title {
      font-size: 14px; font-weight: 800; line-height: 1.3;
    }
    .anatomy-card__subtitle {
      font-size: 11.5px; font-weight: 500; opacity: 0.9; margin-top: 2px;
    }
    .anatomy-card__body {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--surface-2);
    }
    .anatomy-image-frame {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3 / 2;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .anatomy-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .anatomy-caption {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.55;
      max-width: 420px;
    }
    @media (max-width: 600px) {
      .anatomy-card__body { padding: 12px; }
      .anatomy-image-frame { padding: 6px; border-radius: 8px; }
    }

    /* ============================================================
       MENSTRUAL HYGIENE PRACTICES — Module 3, Lesson 2
    ============================================================ */
    .hygiene-section {
      margin-top: 0;
    }
    .hygiene-section__header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 22px;
    }
    .hygiene-section__eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--color-blue-dark);
      background: var(--color-blue-tint);
      border: 1px solid rgba(28,171,226,0.25);
      margin-bottom: 12px;
    }
    [data-theme="dark"] .hygiene-section__eyebrow {
      color: var(--color-cyan);
      background: rgba(28,171,226,0.12);
      border-color: rgba(28,171,226,0.35);
    }
    .hygiene-section__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-blue);
    }
    .hygiene-section__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(20px, 2.6vw, 26px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
      margin: 0 0 8px;
    }
    .hygiene-section__sub {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin: 0;
    }

    .hygiene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .hygiene-card {
      --accent:       var(--color-blue);
      --accent-soft:  rgba(28,171,226,0.10);
      --accent-ring:  rgba(28,171,226,0.22);

      position: relative;
      padding: 22px 18px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(13,71,161,0.04), 0 4px 14px rgba(13,71,161,0.05);
      overflow: hidden;
      transition: transform var(--dur) var(--ease),
                  box-shadow var(--dur) var(--ease),
                  border-color var(--dur) var(--ease);
      isolation: isolate;
    }
    /* Gradient accent bar on top */
    .hygiene-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.9;
    }
    /* Soft tinted glow in the corner */
    .hygiene-card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: var(--accent-soft);
      z-index: -1;
      transition: transform var(--dur) var(--ease);
    }
    .hygiene-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 10px rgba(13,71,161,0.06), 0 18px 36px rgba(13,71,161,0.12);
      border-color: var(--accent-ring);
    }
    .hygiene-card:hover::after {
      transform: scale(1.15);
    }

    .hygiene-card__num {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 11px; font-weight: 800;
      letter-spacing: 1px;
      color: var(--text-muted);
      opacity: 0.7;
    }
    .hygiene-card__media {
      width: calc(100% + 36px);
      margin: -22px -18px 16px;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .hygiene-card__media::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 60%, var(--accent-soft) 100%);
      pointer-events: none;
    }
    .hygiene-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s var(--ease);
    }
    .hygiene-card:hover .hygiene-card__img {
      transform: scale(1.04);
    }
    .hygiene-card__icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--accent-ring);
      box-shadow: 0 4px 10px rgba(13,71,161,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      position: relative;
      margin-top: -34px;        /* lift it to straddle media and body */
      margin-bottom: 12px;
      z-index: 2;
    }
    .hygiene-card__title {
      font-size: 14.5px;
      font-weight: 700;
      line-height: 1.45;
      color: var(--text-primary);
      margin: 0 0 8px;
    }
    .hygiene-card__desc {
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin: 0;
    }

    /* Per-card accent palette (each tone picks from dashboard vocabulary) */
    .hygiene-card--rose   { --accent:#F43F5E; --accent-soft:rgba(244,63,94,0.10);  --accent-ring:rgba(244,63,94,0.22); }
    .hygiene-card--teal   { --accent:#14B8A6; --accent-soft:rgba(20,184,166,0.10); --accent-ring:rgba(20,184,166,0.22); }
    .hygiene-card--amber  { --accent:#F59E0B; --accent-soft:rgba(245,158,11,0.12); --accent-ring:rgba(245,158,11,0.25); }
    .hygiene-card--violet { --accent:#8B5CF6; --accent-soft:rgba(139,92,246,0.10); --accent-ring:rgba(139,92,246,0.22); }
    .hygiene-card--slate  { --accent:#64748B; --accent-soft:rgba(100,116,139,0.10);--accent-ring:rgba(100,116,139,0.22); }
    .hygiene-card--sky    { --accent:#0EA5E9; --accent-soft:rgba(14,165,233,0.10); --accent-ring:rgba(14,165,233,0.22); }
    .hygiene-card--green  { --accent:#10B981; --accent-soft:rgba(16,185,129,0.10); --accent-ring:rgba(16,185,129,0.22); }
    .hygiene-card--indigo { --accent:#6366F1; --accent-soft:rgba(99,102,241,0.10); --accent-ring:rgba(99,102,241,0.22); }
    .hygiene-card--pink   { --accent:#EC4899; --accent-soft:rgba(236,72,153,0.10); --accent-ring:rgba(236,72,153,0.22); }
    .hygiene-card--red    { --accent:#EF4444; --accent-soft:rgba(239,68,68,0.10);  --accent-ring:rgba(239,68,68,0.22); }

    [data-theme="dark"] .hygiene-card {
      box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
    }
    [data-theme="dark"] .hygiene-card:hover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.35), 0 18px 36px rgba(0,0,0,0.5);
    }

    /* Responsive breakpoints */
    @media (max-width: 900px) {
      .hygiene-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
      .hygiene-card { padding: 20px 16px 16px; }
    }
    @media (max-width: 600px) {
      .hygiene-grid { grid-template-columns: 1fr; gap: 12px; }
      .hygiene-card__icon { width: 44px; height: 44px; font-size: 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hygiene-card:hover { transform: none; }
    }

    /* ============================================================
       ROLE SECTIONS — Module 3, Lesson 3
       Parents role / School role / Essential facilities
    ============================================================ */
    .role-section { margin-top: 28px; }
    .role-section:first-of-type { margin-top: 0; }

    .role-section__header {
      position: relative;
      padding: 22px 26px;
      border-radius: 16px 16px 0 0;
      color: #fff;
      overflow: hidden;
      display: flex; align-items: center; gap: 16px;
    }
    .role-section__header::after {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .role-section__header--parents { background: linear-gradient(135deg, #EC4899 0%, #BE185D 55%, #831843 100%); }
    .role-section__header--school  { background: linear-gradient(135deg, #6366F1 0%, #4338CA 55%, #312E81 100%); }
    .role-section__header--faciliy { background: linear-gradient(135deg, #14B8A6 0%, #0F766E 55%, #134E4A 100%); }
    .role-section__header--warn    { background: linear-gradient(135deg, #3f7ff4 0%, #125fbe 55%, #1d7f37 100%) }
    .role-section__header--manage  { background: linear-gradient(135deg, #10B981 0%, #047857 55%, #064E3B 100%); }
    .role-section__header--success { background: linear-gradient(135deg, #10B981 0%, #059669 55%, #047857 100%); }
    /* New color variants for additional sections */
    .role-section__header--teal    { background: linear-gradient(135deg, #14B8A6 0%, #0F766E 55%, #134E4A 100%); }
    .role-section__header--rose    { background: linear-gradient(135deg, #C2185B 0%, #880E4F 55%, #4A148C 100%); }

    .role-section__intro {

      width: 52px; height: 52px; flex-shrink: 0;

    .role-section__titles { position: relative; z-index: 1; min-width: 0; }
    .role-section__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(17px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.3;
      margin: 0 0 2px;
    }
    .role-section__sub {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.9;
      margin: 0;
    }

    .role-section__body {
      padding: 20px;
      background: var(--surface);
    }

    /* Care Section Heading - Styled like Module 3 Lesson 1 */
