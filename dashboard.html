      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0 0 1.2rem 0;
      padding: 0.8rem 1rem;
      background: linear-gradient(90deg, rgba(0, 174, 239, 0.08) 0%, transparent 100%);
      border-left: 4px solid #00AEEF;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0, 174, 239, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.6);
    }

    .care-section-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      color: #00AEEF;
    }

    .care-section-heading {
      font-size: 1.2rem;
      font-weight: 700;
      color: #003d7a;
      margin: 0;
      line-height: 1.3;
      letter-spacing: -0.2px;
      font-family: 'Noto Serif Bengali', serif;
    }
      /* border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 16px 16px;
    } */

    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .role-card {
      --rc-accent: #6366F1;
      --rc-soft:   rgba(99,102,241,0.08);
      --rc-ring:   rgba(99,102,241,0.22);
      position: relative;
      padding: 16px 18px 16px 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(13,71,161,0.04);
      transition: transform var(--dur) var(--ease),
                  box-shadow var(--dur) var(--ease),
                  border-color var(--dur) var(--ease);
    }
    .role-card-title {
      color: #b400ff;
    }
    .role-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 3px 8px rgba(13,71,161,0.06), 0 14px 28px rgba(13,71,161,0.10);
      border-color: var(--rc-ring);
    }
    .role-card__icon {
      position: absolute;
      top: 14px; left: 14px;
      width: 32px; height: 32px;
      border-radius: 9px;
      background: var(--rc-soft);
      border: 1px solid var(--rc-ring);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--rc-accent);
    }
    .role-card__text {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-primary);
      margin: 0;
    }

    .role-card__number {
      position: absolute;
      top: 14px; left: 16px;
      font-size: 24px;
      color: var(--rc-accent);
      font-weight: 700;
    }

    .role-card__content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .role-card__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--text-primary);
      margin: 0;
      font-weight: 600;
    }

    /* Accent palette used across the 3 sections */
    .role-card--rose    { --rc-accent:#F43F5E; --rc-soft:rgba(244,63,94,0.10);   --rc-ring:rgba(244,63,94,0.22); }
    .role-card--pink    { --rc-accent:#EC4899; --rc-soft:rgba(236,72,153,0.10);  --rc-ring:rgba(236,72,153,0.22); }
    .role-card--amber   { --rc-accent:#F59E0B; --rc-soft:rgba(245,158,11,0.12);  --rc-ring:rgba(245,158,11,0.25); }
    .role-card--green   { --rc-accent:#10B981; --rc-soft:rgba(16,185,129,0.10);  --rc-ring:rgba(16,185,129,0.22); }
    .role-card--teal    { --rc-accent:#14B8A6; --rc-soft:rgba(20,184,166,0.10);  --rc-ring:rgba(20,184,166,0.22); }
    .role-card--sky     { --rc-accent:#0EA5E9; --rc-soft:rgba(14,165,233,0.10);  --rc-ring:rgba(14,165,233,0.22); }
    .role-card--indigo  { --rc-accent:#6366F1; --rc-soft:rgba(99,102,241,0.10);  --rc-ring:rgba(99,102,241,0.22); }
    .role-card--violet  { --rc-accent:#8B5CF6; --rc-soft:rgba(139,92,246,0.10);  --rc-ring:rgba(139,92,246,0.22); }
    .role-card--red     { --rc-accent:#EF4444; --rc-soft:rgba(239,68,68,0.10);   --rc-ring:rgba(239,68,68,0.22); }
    .role-card--slate   { --rc-accent:#64748B; --rc-soft:rgba(100,116,139,0.10); --rc-ring:rgba(100,116,139,0.22); }

    .role-card__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      margin: 0 0 8px;
      font-weight: 600;
    }

    .role-card__articles {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mgmt-article {
      margin: 0;
      padding: 0;
    }

    .mgmt-article__text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin: 0;
    }

    .care-section {
      margin-bottom: 28px;
    }

    .care-section__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      margin: 0 0 12px;
      display: flex;
      gap: 8px;
    }

    .care-section__cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    [data-theme="dark"] .role-section__body { background: var(--surface); }

    [data-theme="dark"] .care-section-title {
      background: linear-gradient(90deg, rgba(0, 174, 239, 0.12) 0%, transparent 100%);
      box-shadow: 0 4px 12px rgba(0, 174, 239, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    [data-theme="dark"] .care-section-heading {
      color: #64B5F6;
    }

    /* ──────────────────────────────────────────── */
    /* SUBSECTION HEADERS (Nested inside main section) */
    /* ──────────────────────────────────────────── */
    .subsection {
      margin-bottom: 24px;
      padding: 16px;
      background: var(--bg-hover);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .subsection__header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .subsection__icon {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .subsection__titles {
      min-width: 0;
    }

    .subsection__title {
      font-family: 'Noto Serif Bengali', serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
      color: var(--text-primary);
    }

    .subsection__header--violet {
      border-bottom-color: #7C3AED;
    }

    .subsection__header--success {
      border-bottom-color: #10B981;
    }

    .subsection__header--warn {
      border-bottom-color: #F43F5E;
    }

    @media (max-width: 900px) {
      .role-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
    @media (max-width: 600px) {
      .role-grid { grid-template-columns: 1fr; gap: 12px; }
      .role-section__header { padding: 18px 20px; gap: 12px; }
      .role-section__icon { width: 44px; height: 44px; font-size: 20px; }
      .role-section__body { padding: 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .role-card:hover { transform: none; }
    }

    /* ============================================================
       FEMALE REPRODUCTIVE SYSTEM OVERVIEW — Module 3, Lesson 1
    ============================================================ */
    .organ-section { margin-bottom: 28px; }
    .organ-section__heading {
      position: relative;
      padding-left: 14px;
      margin: 0 0 14px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
    }
    .organ-section__heading::before {
      content: '';
      position: absolute;
      left: 0; top: 6px; bottom: 6px;
      width: 4px; border-radius: 4px;
      background: linear-gradient(180deg, var(--color-blue), var(--color-navy));
    }

    /* Common heading 2 class - reuses organ-section__heading styles */
    .common_heading_2 {
      position: relative;
      padding-left: 14px;
      margin: 0 0 14px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
    }
    .common_heading_2::before {
      content: '';
      position: absolute;
      left: 0; top: 6px; bottom: 6px;
      width: 4px; border-radius: 4px;
      background: linear-gradient(180deg, var(--color-blue), var(--color-navy));
    }

    /* Module 2 Lesson 1 specific heading - uses green gradient */
    .changes-section__heading.common_heading_2::before {
      background: linear-gradient(180deg, var(--color-green), var(--color-green-dark));
    }

    .organ-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    /* Module 4 Lesson 1: force 2 cards per row on desktop */
    .organ-section--male .organ-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .organ-card {
      --og-from: #1CABE2;
      --og-to:   #0D47A1;
      --og-soft: rgba(28,171,226,0.08);
      --og-ring: rgba(28,171,226,0.22);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(13,71,161,0.04), 0 4px 14px rgba(13,71,161,0.05);
      overflow: hidden;
      transition: transform var(--dur) var(--ease),
                  box-shadow var(--dur) var(--ease),
                  border-color var(--dur) var(--ease);
    }
    .organ-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 10px rgba(13,71,161,0.06), 0 18px 36px rgba(13,71,161,0.12);
      border-color: var(--og-ring);
    }

    .organ-card__header {
      position: relative;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--og-from) 0%, var(--og-to) 100%);
      color: #fff;
      display: flex; align-items: center; gap: 12px;
      overflow: hidden;
    }
    .organ-card__header::after {
      content: '';
      position: absolute;
      top: -50%; right: -15%;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      pointer-events: none;
    }
    .organ-card__icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 11px;
      background: rgba(255,255,255,0.20);
      border: 1px solid rgba(255,255,255,0.30);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      position: relative; z-index: 1;
    }
    .organ-card__title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0;
      position: relative; z-index: 1;
    }

    .organ-card__body {
      padding: 16px 18px 18px;
    }
    .organ-card__text {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin: 0;
    }

    /* Per-card gradient palette (pulls from dashboard vocabulary) */
    .organ-card--ovaries      { --og-from:#EC4899; --og-to:#831843; --og-ring:rgba(236,72,153,0.22); }
    .organ-card--uterus       { --og-from:#8B5CF6; --og-to:#4C1D95; --og-ring:rgba(139,92,246,0.22); }
    .organ-card--fallopian    { --og-from:#F59E0B; --og-to:#B45309; --og-ring:rgba(245,158,11,0.25); }
    .organ-card--vagina       { --og-from:#14B8A6; --og-to:#134E4A; --og-ring:rgba(20,184,166,0.22); }
    .organ-card--breasts      { --og-from:#F43F5E; --og-to:#7F1D1D; --og-ring:rgba(244,63,94,0.22); }
    /* Male reproductive system variants (Module 4 Lesson 1) */
    .organ-card--penis        { --og-from:#0EA5E9; --og-to:#075985; --og-ring:rgba(14,165,233,0.22); }
    .organ-card--urethra      { --og-from:#6366F1; --og-to:#312E81; --og-ring:rgba(99,102,241,0.22); }
    .organ-card--testes       { --og-from:#3B82F6; --og-to:#1E3A8A; --og-ring:rgba(59,130,246,0.22); }
    .organ-card--sperm        { --og-from:#06B6D4; --og-to:#155E75; --og-ring:rgba(6,182,212,0.22); }

    @media (max-width: 900px) {
      .organ-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
      .organ-section--male .organ-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 600px) {
      .organ-grid { grid-template-columns: 1fr; gap: 12px; }
      .organ-section--male .organ-grid { grid-template-columns: 1fr; }
      .organ-card__header { padding: 14px 16px; }
      .organ-card__icon { width: 36px; height: 36px; font-size: 18px; }
      .organ-card__body { padding: 14px 16px 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .organ-card:hover { transform: none; }
    }

    /* ============================================================
       NOCTURNAL EMISSION — Module 4, Lesson 1 (standalone section)
    ============================================================ */
    .nocturnal-section { margin-top: 28px; }
    .nocturnal-wrap {
      display: flex;
      justify-content: center;
    }
    .nocturnal-card {
      width: 33.333%;
      min-width: 0;
      background: linear-gradient(160deg, #1E3A8A 0%, #1E40AF 55%, #1D4ED8 100%);
      color: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(30,58,138,0.18), 0 20px 40px rgba(30,58,138,0.22);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .nocturnal-card__media {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .nocturnal-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .nocturnal-card__body {
      padding: 18px 20px 20px;
    }
    .nocturnal-card__body .organ-card__text {
      color: rgba(255,255,255,0.92);
      font-size: 13px;
      line-height: 1.75;
      margin: 0;
    }

    @media (max-width: 1200px) {
      .nocturnal-card { width: 50%; }
    }
    @media (max-width: 700px) {
      .nocturnal-card { width: 100%; }
    }

    /* ============================================================
       LESSON SUBHEADING
    ============================================================ */
    .lesson-subheading {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-secondary);
      margin: 0 0 24px;
      padding: 16px 20px;
      background: var(--surface-2);
      border-left: 4px solid var(--color-blue);
      border-radius: 8px;
    }

    [data-theme="dark"] .lesson-subheading {
      background: rgba(28,171,226,0.08);
    }

    /* ============================================================
       FAMILY PLANNING COMPARISON SECTION
    ============================================================ */
    .section-divider {
      margin: 32px 0 24px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-divider__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .section-divider__title span {
      display: block;
    }

    .section-divider__title::after {
      content: '';
      display: block;
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--color-blue), var(--color-cyan));
      border-radius: 2px;
      margin-top: 8px;
    }

    /* Table Wrapper */
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    /* Comparison Table */
    .comparison-table,
    .details-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .comparison-table thead,
    .details-table thead {
      background: linear-gradient(135deg, rgba(28,171,226,0.08), rgba(105,206,236,0.06));
      border-bottom: 2px solid var(--border);
    }

    .comparison-table th,
    .details-table th {
      padding: 16px 5px;
      text-align: start;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .comparison-table tbody tr,
    .details-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background-color var(--dur) var(--ease);
    }

    .comparison-table tbody tr:hover,
    .details-table tbody tr:hover {
      background-color: var(--surface-2);
    }

    .table-header {
      padding: 14px 12px;
      font-size: 13px;
      border-right: 1px solid #eaeaea;
    }

    .method-header {
      text-align: center;
      padding: 12px 8px;
    }

    .table-cell {
      padding: 14px 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      border-right: 1px solid #eaeaea;

    }

    .category-cell {
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
    }

    .cell-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .check-cell {
      text-align: center;
      color: var(--color-green);
      font-size: 18px;
      font-weight: 700;
      background: rgba(46,204,113,0.05);
    }

    .method-name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface-2);
      min-width: 180px;
      white-space: nowrap;
    }

    .duration-cell {
      padding: 14px 12px;
    }

    /* Method Badge */
    .method-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }

    .method-badge:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .method-badge--sky {
      background: rgba(14,165,233,0.15);
      color: #0284C7;
      border: 1px solid rgba(14,165,233,0.3);
    }

    .method-badge--amber {
      background: rgba(245,158,11,0.15);
      color: #B45309;
      border: 1px solid rgba(245,158,11,0.3);
    }

    .method-badge--green {
      background: rgba(16,185,129,0.15);
      color: #047857;
      border: 1px solid rgba(16,185,129,0.3);
    }

    .method-badge--indigo {
      background: rgba(99,102,241,0.15);
      color: #4F46E5;
      border: 1px solid rgba(99,102,241,0.3);
    }

    .method-badge--violet {
      background: rgba(139,92,246,0.15);
      color: #7C3AED;
      border: 1px solid rgba(139,92,246,0.3);
    }

    .method-badge--rose {
      background: rgba(244,63,94,0.15);
      color: #BE123C;
      border: 1px solid rgba(244,63,94,0.3);
    }

    .method-badge--teal {
      background: rgba(20,184,166,0.15);
      color: #0D9488;
      border: 1px solid rgba(20,184,166,0.3);
    }

    /* Duration Badge */
    .duration-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(99,102,241,0.12);
      color: #4F46E5;
      border: 1px solid rgba(99,102,241,0.25);
      white-space: nowrap;
    }

    [data-theme="dark"] .table-wrapper {

      height: 100%;

      height: 105px;

/* ── STATE ───────────────────────────────────────── */
let activeModule = 0;
let activeLesson = 0;    // null = module overview
let currentLang  = 'bn';

/* ── UTILS ───────────────────────────────────────── */
function esc(str) {
  return String(str).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
  );
}
function isMobile() { return window.innerWidth <= 900; }

/* ── ACCORDION — single-open ─────────────────────── */
const _panelHeights = new Map(); // cache scrollHeight per panel id

function openModule(idx) {
  const count = MODULES.length;
  for (let i = 0; i < count; i++) {
    const trigger = document.getElementById('modTrigger-' + i);
    const panel   = document.getElementById('modPanel-'   + i);
    if (!trigger || !panel) continue;
    const open = (i === idx);
    trigger.setAttribute('aria-expanded', String(open));
    panel.dataset.open = String(open);
    if (open) {
      // Measure only if not cached or panel height might have changed
      if (!_panelHeights.has(i)) _panelHeights.set(i, panel.scrollHeight);
      panel.style.maxHeight = _panelHeights.get(i) + 'px';
    } else {
      panel.style.maxHeight = '0';
    }
  }
}

function handleModuleClick(idx) {
  const trigger = document.getElementById('modTrigger-' + idx);
  const isOpen  = trigger.getAttribute('aria-expanded') === 'true';
  if (isOpen) {
    // Close this panel (allow toggling closed)
    trigger.setAttribute('aria-expanded', 'false');
    document.getElementById('modPanel-' + idx).style.maxHeight = '0';
  } else {
    openModule(idx);
  }
  loadModule(idx);
}

/* ── NAVIGATION ──────────────────────────────────── */
function loadModule(modIdx) {
  activeModule = modIdx;
  activeLesson = null;
  saveCurrentLesson(modIdx, -1);  // Save module overview with lesIdx = -1
  syncSidebarActive(modIdx, null);
  renderModulePage(modIdx);
  syncBottomLabel();
  scrollContentToTop();
}

function loadLesson(modIdx, lesIdx) {
  activeModule = modIdx;
  activeLesson = lesIdx;
  saveCurrentLesson(modIdx, lesIdx);  // Save to localStorage
  openModule(modIdx);
  syncSidebarActive(modIdx, lesIdx);
  renderLessonPage(modIdx, lesIdx);
  syncBottomLabel();
  scrollContentToTop();
  if (isMobile()) closeMobileSidebar();
}

function navigate(dir) {
  const total = LESSONS_BN[activeModule].length;
  if (activeLesson === null) {
    if (dir > 0) loadLesson(activeModule, 0);
    return;
  }
  const next = activeLesson + dir;
  if (next < 0) {
    loadModule(activeModule);
  } else if (next >= total) {
    const nextMod = activeModule + 1;
    if (nextMod < MODULES.length) { openModule(nextMod); loadModule(nextMod); }
  } else {
    loadLesson(activeModule, next);
  }
}

function scrollContentToTop() {
  document.getElementById('contentArea').scrollTop = 0;
}

/* ── LESSON PERSISTENCE ──────────────────────────── */
function saveCurrentLesson(modIdx, lesIdx) {
  localStorage.setItem('lastModule', String(modIdx));
  localStorage.setItem('lastLesson', String(lesIdx));
}

function restoreSavedLesson() {
  const savedModule = localStorage.getItem('lastModule');
  const savedLesson = localStorage.getItem('lastLesson');
  if (savedModule !== null && savedLesson !== null) {
    const modIdx = parseInt(savedModule, 10);
    const lesIdx = parseInt(savedLesson, 10);
    // Validate module index is within bounds
    if (modIdx >= 0 && modIdx < MODULES.length) {
      // If lesIdx is -1, it's a module overview page
      if (lesIdx === -1) {
        return { modIdx, lesIdx };
      }
      // Otherwise validate lesson index is within bounds
      if (lesIdx >= 0 && lesIdx < LESSONS_BN[modIdx].length) {
        return { modIdx, lesIdx };
      }
    }
  }
  return null;  // Return null if no valid saved lesson
}

/* ── SIDEBAR ACTIVE STATE ────────────────────────── */
function syncSidebarActive(modIdx, lesIdx) {
  document.querySelectorAll('.module-trigger').forEach(t => t.classList.remove('is-active'));
  document.querySelectorAll('.lesson-btn').forEach(b => {
    b.classList.remove('is-active');
    b.removeAttribute('aria-current');
  });
  const trigger = document.getElementById('modTrigger-' + modIdx);
  if (trigger) trigger.classList.add('is-active');
  if (lesIdx !== null) {
    const btns = document.querySelectorAll('#modPanel-' + modIdx + ' .lesson-btn');
    if (btns[lesIdx]) {
      btns[lesIdx].classList.add('is-active');
      btns[lesIdx].setAttribute('aria-current', 'page');
    }
  }
}

/* ── BOTTOM LABEL ────────────────────────────────── */
function syncBottomLabel() {
  const el = document.getElementById('bottomLabel');
  const isBn = currentLang === 'bn';
  el.textContent = activeLesson === null
    ? (isBn ? `মডিউল ${activeModule+1} — পরিচিতি` : `Module ${activeModule+1} — Overview`)
    : (isBn ? `মডিউল ${activeModule+1} — পাঠ ${activeLesson+1}` : `Module ${activeModule+1} — Lesson ${activeLesson+1}`);
}

          <p class="organ-card__text en">There are two ovaries, one on each side of the uterus. Around the middle of each 28-day menstrual cycle, one of the two ovaries matures an egg (ovum), which is then released from the ovary and enters the fallopian tube.</p>

      <p class="app-intro-sub bn">নারী ও পুরুষের ভিন্নতা, আচরণ ও সামাজিক অবস্থাভেদে নারী ও পুরুষের মধ্যে কিছু বৈষম্য সৃষ্টি হয়। সামাজিক দৃষ্টিভঙ্গি, ধর্মের অপব্যাখ্যা, মেয়েদের ছোট করে দেখার মানসিকতা ইত্যাদি জেন্ডার বৈষম্য সৃষ্টিতে প্রধান ভূমিকা পালন করে। জেন্ডারের এই বৈষম্যকে পরিবার, সমাজ যখন মেনে নেয় ও আইন, নীতি বা মূল্যবোধের মাধ্যমে রাষ্ট্র যখন বৈধতা দেয় তখন তা প্রাতিষ্ঠানিক রূপ লাভ করে এবং সেটি বৈষম্য হিসেবে গণ্য হয়। এই বৈষম্য সামাজিকভাবে তৈরি যা পরিবার, সমাজ ও সংস্কৃতি থেকে গৃহীত, সমাজ ও স্থান ভেদে ভিন্ন, এবং অবশ্যই পরিবর্তনশীল।</p>
      <p class="app-intro-sub en">Differences in behavior and social status between women and men create inequalities. Social attitudes, misinterpretation of religion, and the mindset of looking down on girls play a major role in producing gender discrimination. When family and society accept such discrimination and the state legitimizes it through laws, policies, or values, it becomes institutionalized and is then counted as discrimination. This discrimination is socially created, inherited from family, society, and culture, varies by society and place, and is definitely changeable.</p>
    </div>

/* ── SIDEBAR TOGGLE ──────────────────────────────── */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const toggle  = document.getElementById('sidebarToggle');
  if (isMobile()) {
    const open = sidebar.dataset.mobileOpen === 'true';
    if (open) { closeMobileSidebar(); } else {
      sidebar.dataset.mobileOpen = 'true';
      document.getElementById('sidebarOverlay').classList.add('is-visible');
      toggle.setAttribute('aria-expanded', 'true');
    }
  } else {
    const collapsed = sidebar.dataset.collapsed === 'true';
    sidebar.dataset.collapsed = String(!collapsed);
    toggle.setAttribute('aria-expanded', String(collapsed));
    document.getElementById('dashboard').style.gridTemplateColumns =
      collapsed ? '' : '0 1fr';
  }
}

function closeMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.dataset.mobileOpen = 'false';
  document.getElementById('sidebarOverlay').classList.remove('is-visible');
  document.getElementById('sidebarToggle').setAttribute('aria-expanded', 'false');
}

/* ── LANGUAGE ────────────────────────────────────── */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang === 'bn' ? 'bn' : 'en');
  document.getElementById('btnBn').setAttribute('aria-pressed', String(lang === 'bn'));
  document.getElementById('btnEn').setAttribute('aria-pressed', String(lang === 'en'));
  syncBottomLabel();
}

/* ── THEME ───────────────────────────────────────── */
function toggleTheme() {
  const html   = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  const btn = document.getElementById('themeBtn');
  btn.textContent = isDark ? '☀️' : '🌙';
  btn.setAttribute('aria-label', isDark ? 'Switch to dark mode' : 'Switch to light mode');
}

/* ── KEYBOARD ────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isMobile()) closeMobileSidebar();
});

/* ── INIT ────────────────────────────────────────── */
(function () {
  const saved = restoreSavedLesson();
  if (saved) {
    openModule(saved.modIdx);
    if (saved.lesIdx === -1) {
      loadModule(saved.modIdx);  // Module overview
    } else {
      loadLesson(saved.modIdx, saved.lesIdx);  // Specific lesson
    }
  } else {
    openModule(0);        // open Module 1 accordion
    loadLesson(0, 0);     // load Module 1, Lesson 1
  }
  setLang('bn');        // default language
})();
</script>
